<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tienda — D&D 5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#0d0d0d; --surface:#141414; --card:#1a1a1a; --card2:#1f1f1f;
  --border:#2a2a2a; --border2:#333;
  --red:#c62828; --red2:#e53935; --gold:#c8a84b; --gold2:#e8c87a;
  --text:#e8e0d0; --muted:#888; --dim:#555;
  --green:#4caf50; --blue:#42a5f5; --purple:#ab47bc; --orange:#ff7043;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;min-height:100vh;}

/* NAV */
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);text-decoration:none;white-space:nowrap;}
.topbar-nav{display:flex;gap:4px;margin-left:auto;}
.topbar-nav a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:var(--radius);font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.5px;transition:all 0.2s;}
.topbar-nav a:hover{color:var(--gold);background:rgba(200,168,75,0.08);}
.topbar-nav a.active{color:var(--gold);background:rgba(200,168,75,0.12);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 49px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
.main{padding:24px;overflow-y:auto;}

/* SIDEBAR */
.sidebar h3{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;margin-top:20px;}
.sidebar h3:first-child{margin-top:0;}
.search-wrap{position:relative;margin-bottom:4px;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.95rem;}
.search-wrap::before{content:'⚔';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;}
.search-wrap input:focus{outline:none;border-color:var(--gold);background:var(--card2);}

.filter-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.78rem;cursor:pointer;transition:all 0.2s;font-family:'Cinzel',serif;letter-spacing:0.3px;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;}

.range-row{display:flex;gap:8px;align-items:center;}
.range-row input{flex:1;padding:7px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;width:100%;}
.range-row input:focus{outline:none;border-color:var(--gold);}
.range-row span{color:var(--muted);font-size:0.85rem;}

.prop-list{display:flex;flex-direction:column;gap:4px;}
.prop-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.88rem;color:var(--muted);padding:3px 0;}
.prop-check input{accent-color:var(--gold);width:14px;height:14px;}
.prop-check:hover{color:var(--text);}

.btn-reset{width:100%;padding:8px;margin-top:16px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:1px;transition:all 0.2s;}
.btn-reset:hover{border-color:var(--red);color:var(--red);}

/* MAIN AREA */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.results-count{color:var(--muted);font-size:0.88rem;margin-right:auto;}
.results-count strong{color:var(--gold);}
.sort-select{padding:8px 12px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;cursor:pointer;}
.sort-select:focus{outline:none;border-color:var(--gold);}
.view-btns{display:flex;gap:4px;}
.view-btn{padding:8px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-size:1rem;transition:all 0.2s;}
.view-btn.on{background:var(--gold);border-color:var(--gold);color:#000;}

/* GRID VIEW */
#itemsGrid.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px;}
#itemsGrid.list-view{display:flex;flex-direction:column;gap:6px;}

/* ITEM CARD - GRID */
.item-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.item-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--type-color,var(--dim));opacity:0.7;transition:opacity 0.2s;}
.item-card:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px);}
.item-card:hover::before{opacity:1;}
.item-card.selected{border-color:var(--gold);background:var(--card2);}
.item-card.selected::before{opacity:1;}

/* Grid card layout */
.grid-view .item-card{padding:14px;}
.grid-view .itemIcon{font-size:1.8rem;margin-bottom:8px;display:block;}
.grid-view .item-name{font-family:'Cinzel',serif;font-size:0.88rem;color:var(--text);margin-bottom:4px;line-height:1.3;}
.grid-view .item-sub{font-size:0.8rem;color:var(--muted);margin-bottom:8px;font-style:italic;}
.grid-view .item-stat{font-size:0.82rem;color:var(--gold2);margin-bottom:2px;}
.grid-view .item-price{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--gold);margin-top:8px;font-weight:600;}
.grid-view .item-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:8px;}
.tag{padding:2px 7px;border-radius:10px;font-size:0.7rem;background:rgba(255,255,255,0.05);color:var(--muted);border:1px solid var(--border);}

/* List card layout */
.list-view .item-card{padding:10px 14px;display:grid;grid-template-columns:2rem 1fr auto auto;align-items:center;gap:12px;}
.list-view .itemIcon{font-size:1.3rem;}
.list-view .item-name{font-family:'Cinzel',serif;font-size:0.85rem;}
.list-view .item-sub{font-size:0.78rem;color:var(--muted);font-style:italic;}
.list-view .item-stat{font-size:0.82rem;color:var(--gold2);}
.list-view .item-price{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--gold);white-space:nowrap;text-align:right;}
.list-view .item-tags{display:none;}

/* DETAIL PANEL */
.detail-panel{position:fixed;right:0;top:49px;bottom:0;width:360px;background:var(--surface);border-left:1px solid var(--border);padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;z-index:90;}
.detail-panel.open{transform:translateX(0);}
.detail-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:4px 8px;}
.detail-close:hover{color:var(--text);}
.detail-icon{font-size:3rem;display:block;margin-bottom:12px;}
.detail-name{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold);margin-bottom:4px;line-height:1.3;}
.detail-type{font-size:0.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-family:'Cinzel',serif;}
.detail-price{font-family:'Cinzel',serif;font-size:1.6rem;color:var(--gold2);font-weight:700;margin-bottom:16px;}
.detail-section{margin-bottom:16px;}
.detail-section h4{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.detail-desc{font-size:0.92rem;line-height:1.7;color:var(--text);}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.88rem;}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:var(--muted);}
.stat-val{color:var(--text);font-weight:600;}
.stat-val.good{color:var(--green);}
.stat-val.special{color:var(--purple);}
.detail-tags{display:flex;flex-wrap:wrap;gap:5px;}
.detail-tag{padding:3px 10px;border-radius:12px;font-size:0.75rem;border:1px solid;font-family:'Cinzel',serif;}
.prop-light{color:#42a5f5;border-color:#42a5f5;background:rgba(66,165,245,0.08);}
.prop-pesada{color:#ff7043;border-color:#ff7043;background:rgba(255,112,67,0.08);}
.prop-versátil{color:#ab47bc;border-color:#ab47bc;background:rgba(171,71,188,0.08);}
.prop-sutil{color:#4caf50;border-color:#4caf50;background:rgba(76,175,80,0.08);}
.prop-arrojadiza{color:#ffa726;border-color:#ffa726;background:rgba(255,167,38,0.08);}
.prop-default{color:var(--muted);border-color:var(--border);}
.req-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:var(--radius);font-size:0.8rem;font-family:'Cinzel',serif;}
.req-ok{background:rgba(76,175,80,0.12);color:var(--green);border:1px solid rgba(76,175,80,0.3);}
.req-none{background:rgba(255,255,255,0.04);color:var(--muted);border:1px solid var(--border);}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:var(--dim);}
.empty span{font-size:3rem;display:block;margin-bottom:12px;}
.empty p{font-size:1rem;color:var(--muted);}

/* PAGE */
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:24px;}
.page-btn{padding:7px 13px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.8rem;transition:all 0.2s;}
.page-btn:hover:not(:disabled):not(.active){border-color:var(--gold);color:var(--gold);}
.page-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
.page-btn:disabled{opacity:0.3;cursor:default;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .detail-panel{width:100%;top:49px;}
  .topbar-nav a { padding: 5px 7px; font-size: 0.62rem; }
}
</style>
</head>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Buscar</h3>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Nombre del objeto..." oninput="filterAndRender()">
    </div>

    <h3>Categoría</h3>
    <div class="filter-chips" id="catChips">
      <div class="chip on" data-cat="all">Todo</div>
      <div class="chip" data-cat="arma_simple">Armas Simples</div>
      <div class="chip" data-cat="arma_marcial">Armas Marciales</div>
      <div class="chip" data-cat="armadura">Armaduras</div>
      <div class="chip" data-cat="escudo">Escudos</div>
      <div class="chip" data-cat="equipo">Equipo</div>
      <div class="chip" data-cat="consumible">Consumibles</div>
      <div class="chip" data-cat="magico">Mágicos</div>
      <div class="chip" data-cat="municion">Munición</div>
    </div>

    <h3>Subtipo</h3>
    <div class="filter-chips" id="subChips">
      <div class="chip on" data-sub="all">Todo</div>
      <div class="chip" data-sub="cuerpo_a_cuerpo">CaC</div>
      <div class="chip" data-sub="distancia">Distancia</div>
      <div class="chip" data-sub="ligera">Ligera</div>
      <div class="chip" data-sub="media">Media</div>
      <div class="chip" data-sub="pesada">Pesada</div>
    </div>

    <h3>Precio (PO)</h3>
    <div class="range-row">
      <input type="number" id="priceMin" placeholder="Min" min="0" oninput="filterAndRender()">
      <span>—</span>
      <input type="number" id="priceMax" placeholder="Max" min="0" oninput="filterAndRender()">
    </div>

    <h3>Propiedades</h3>
    <div class="prop-list" id="propFilters">
      <label class="prop-check"><input type="checkbox" data-prop="ligera" onchange="filterAndRender()"> Ligera</label>
      <label class="prop-check"><input type="checkbox" data-prop="pesada" onchange="filterAndRender()"> Pesada</label>
      <label class="prop-check"><input type="checkbox" data-prop="versátil" onchange="filterAndRender()"> Versátil</label>
      <label class="prop-check"><input type="checkbox" data-prop="arrojadiza" onchange="filterAndRender()"> Arrojadiza</label>
      <label class="prop-check"><input type="checkbox" data-prop="sutil" onchange="filterAndRender()"> Sutil</label>
      <label class="prop-check"><input type="checkbox" data-prop="alcance" onchange="filterAndRender()"> Alcance</label>
      <label class="prop-check"><input type="checkbox" data-prop="dos manos" onchange="filterAndRender()"> Dos Manos</label>
      <label class="prop-check"><input type="checkbox" data-prop="munición" onchange="filterAndRender()"> Munición</label>
    </div>

    <button class="btn-reset" onclick="resetFilters()">✕ Limpiar Filtros</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="toolbar">
      <div class="results-count"><strong id="countNum">0</strong> objetos encontrados</div>
      <select class="sort-select" id="sortSel" onchange="filterAndRender()">
        <option value="nombre">Nombre A→Z</option>
        <option value="nombre_desc">Nombre Z→A</option>
        <option value="precio_asc">Precio: Menor primero</option>
        <option value="precio_desc">Precio: Mayor primero</option>
        <option value="peso_asc">Peso: Menor primero</option>
        <option value="daño">Mayor Daño</option>
      </select>
      <div class="view-btns">
        <button class="view-btn on" id="vGrid" onclick="setView('grid')" title="Cuadrícula">▦</button>
        <button class="view-btn" id="vList" onclick="setView('list')" title="Lista">≡</button>
      </div>
    </div>

    <div id="itemsGrid" class="grid-view"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detailContent"></div>
</div>

<script>
/* =====================================================
   BIBLIOTECA COMPLETA DE OBJETOS D&D 5e
   ===================================================== */
const ITEMS = [
  // ════════════════════════════════════════════
  // ARMAS SIMPLES - CUERPO A CUERPO
  // ════════════════════════════════════════════
  {id:'club',nombre:'Clava',cat:'arma_simple',sub:'cuerpo_a_cuerpo',precio:0.1,peso:1,icono:'🪵',

/* =====================================================
   LÓGICA DE FILTRADO Y RENDERIZADO
   ===================================================== */
let currentView = 'grid';
let currentPage = 1;
const PER_PAGE = 24;
let filtered = [...ITEMS];
let selectedId = null;

// CHIPS
document.querySelectorAll('#catChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#catChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});
document.querySelectorAll('#subChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#subChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});

function filterAndRender() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const cat = document.querySelector('#catChips .chip.on')?.dataset.cat || 'all';
  const sub = document.querySelector('#subChips .chip.on')?.dataset.sub || 'all';
  const pMin = parseFloat(document.getElementById('priceMin').value) || 0;
  const pMax = parseFloat(document.getElementById('priceMax').value) || Infinity;
  const activeProp = [...document.querySelectorAll('[data-prop]:checked')].map(cb => cb.dataset.prop);
  const sort = document.getElementById('sortSel').value;

  filtered = ITEMS.filter(item => {
    if (q && !item.nombre.toLowerCase().includes(q) && !item.desc.toLowerCase().includes(q)) return false;
    if (cat !== 'all' && item.cat !== cat) return false;
    if (sub !== 'all' && item.sub !== sub) return false;
    if (item.precio < pMin || item.precio > pMax) return false;
    if (activeProp.length > 0 && !activeProp.every(p => item.propiedades.some(ip => ip.toLowerCase().includes(p)))) return false;
    return true;
  });

  // SORT
  filtered.sort((a, b) => {
    if (sort === 'nombre') return a.nombre.localeCompare(b.nombre,'es');
    if (sort === 'nombre_desc') return b.nombre.localeCompare(a.nombre,'es');
    if (sort === 'precio_asc') return a.precio - b.precio;
    if (sort === 'precio_desc') return b.precio - a.precio;
    if (sort === 'peso_asc') return a.peso - b.peso;
    if (sort === 'daño') {
      const da = parseDaño(a.daño); const db = parseDaño(b.daño);
      return db - da;
    }
    return 0;
  });

  currentPage = 1;
  render();
}

function parseDaño(d) {
  if (!d || d === '-') return 0;
  const m = d.match(/(\d+)d(\d+)/);
  if (m) return parseInt(m[1]) * (parseInt(m[2])+1)/2;
  return parseFloat(d) || 0;
}

function render() {
  const grid = document.getElementById('itemsGrid');
  const start = (currentPage-1)*PER_PAGE;
  const page = filtered.slice(start, start+PER_PAGE);

  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><span>🔍</span><h3>Sin resultados</h3><p>Prueba con otros filtros o búsqueda</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const isGrid = currentView === 'grid';
  grid.innerHTML = page.map(item => {
    const typeColor = getTypeColor(item.cat);
    if (isGrid) {
      return `<div class="item-card${item.id===selectedId?' selected':''}" style="--type-color:${typeColor}" onclick="showDetail('${item.id}')">
        <span class="item-icon">${item.icono}</span>
        <div class="item-name">${item.nombre}</div>
        <div class="item-sub">${getCatLabel(item.cat)} · ${item.sub.replace(/_/g,' ')}</div>
        ${item.daño && item.daño !== '-' ? `<div class="item-stat">⚔ ${item.daño} ${item.tipo_daño}</div>` : ''}
        ${item.ca && item.ca !== '-' ? `<div class="item-stat">🛡 CA ${item.ca}</div>` : ''}
        ${item.rango && item.rango !== '-' ? `<div class="item-stat">🏹 ${item.rango}</div>` : ''}
        <div class="item-price">${formatPrice(item.precio)}</div>
        <div class="item-tags">${item.propiedades.slice(0,3).map(p=>`<span class="tag">${p}</span>`).join('')}</div>
      </div>`;
    } else {
      return `<div class="item-card${item.id===selectedId?' selected':''}" style="--type-color:${typeColor}" onclick="showDetail('${item.id}')">
        <span class="item-icon">${item.icono}</span>
        <div>
          <div class="item-name">${item.nombre}</div>
          <div class="item-sub">${getCatLabel(item.cat)} · ${item.sub.replace(/_/g,' ')}</div>
        </div>
        <div class="item-stat">${item.daño && item.daño!=='-'?item.daño+' '+item.tipo_daño : (item.ca&&item.ca!=='-'?'CA '+item.ca:'—')}</div>
        <div class="item-price">${formatPrice(item.precio)}</div>
      </div>`;
    }
  }).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="gotoPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=1)
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===2)
      html += `<span style="color:var(--dim);padding:0 4px">…</span>`;
  }
  html += `<button class="page-btn" onclick="gotoPage(${currentPage+1})" ${currentPage===total?'disabled':''}>→</button>`;
  pg.innerHTML = html;
}

function gotoPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p<1||p>total) return;
  currentPage = p;
  render();
  document.querySelector('.main').scrollTop = 0;
}

function setView(v) {
  currentView = v;
  document.getElementById('itemsGrid').className = v==='grid' ? 'grid-view' : 'list-view';
  document.getElementById('vGrid').classList.toggle('on', v==='grid');
  document.getElementById('vList').classList.toggle('on', v==='list');
  render();
}

function showDetail(id) {
  const item = ITEMS.find(i=>i.id===id);
  if (!item) return;
  selectedId = id;
  render();

  const propClass = p => {
    if (p.includes('ligera')) return 'prop-ligera';
    if (p.includes('pesada')) return 'prop-pesada';
    if (p.includes('versátil')) return 'prop-versátil';
    if (p.includes('sutil')) return 'prop-sutil';
    if (p.includes('arrojadiza')) return 'prop-arrojadiza';
    return 'prop-default';
  };

  const statsRows = [];
  if (item.peso) statsRows.push(['Peso', item.peso + ' lb']);
  if (item.daño && item.daño!=='-') statsRows.push(['Daño', item.daño + ' ' + item.tipo_daño]);
  if (item.daño_versátil) statsRows.push(['Daño (2 manos)', item.daño_versátil + ' ' + item.tipo_daño]);
  if (item.ca && item.ca!=='-') statsRows.push(['CA', item.ca]);
  if (item.rango && item.rango!=='-') statsRows.push(['Alcance/Rango', item.rango]);

  const clasesStr = item.clases.includes('todo') ? 'Todas las clases' : item.clases.join(', ');

  document.getElementById('detailContent').innerHTML = `
    <span class="detail-icon">${item.icono}</span>
    <div class="detail-name">${item.nombre}</div>
    <div class="detail-type">${getCatLabel(item.cat)} · ${item.sub.replace(/_/g,' ')}</div>
    <div class="detail-price">${formatPrice(item.precio)}</div>

    <div class="detail-section">
      <h4>Descripción</h4>
      <p class="detail-desc">${item.desc}</p>
    </div>

    ${statsRows.length ? `<div class="detail-section">
      <h4>Estadísticas</h4>
      ${statsRows.map(([l,v])=>`<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-val">${v}</span></div>`).join('')}
    </div>` : ''}

    ${item.propiedades.length ? `<div class="detail-section">
      <h4>Propiedades</h4>
      <div class="detail-tags">${item.propiedades.map(p=>`<span class="detail-tag ${propClass(p)}">${p}</span>`).join('')}</div>
    </div>` : ''}

    <div class="detail-section">
      <h4>Clases</h4>
      <span class="req-badge req-none">${clasesStr}</span>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
  render();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.getElementById('priceMin').value = '';
  document.getElementById('priceMax').value = '';
  document.querySelectorAll('#catChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('#subChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('[data-prop]').forEach(cb=>cb.checked=false);
  document.getElementById('sortSel').value = 'nombre';
  filterAndRender();
}

function getTypeColor(cat) {
  const m = {arma_simple:'#c8a84b',arma_marcial:'#e53935',armadura:'#42a5f5',escudo:'#26c6da',equipo:'#66bb6a',consumible:'#ab47bc',magico:'#ef5350',municion:'#8d6e63'};
  return m[cat]||'#888';
}

function getCatLabel(cat) {
  const m = {arma_simple:'Arma Simple',arma_marcial:'Arma Marcial',armadura:'Armadura',escudo:'Escudo',equipo:'Equipo',consumible:'Consumible',magico:'Objeto Mágico',municion:'Munición'};
  return m[cat]||cat;
}

function formatPrice(p) {
  if (p === 0) return 'Gratis';
  if (p < 1) return `${p*10} PC`;
  if (p < 10) return `${p} PP`;
  return `${p} PO`;
}

// INIT
filterAndRender();
</script>
</body>
</html>
