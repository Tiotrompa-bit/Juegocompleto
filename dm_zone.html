<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>DM - D&D 5e</title>
    <style>
        /* ====================================================
           ESTILOS DM - Tema oscuro optimizado para móvil
        ==================================================== */
        :root {
            --bg: #1e1e1e;
            --card: #2a2a2a;
            --gray: #555;
            --white: #fff;
            --radius: 6px;
            --trans: 0.25s;
            --accent: #c62828;
            --exito: #4caf50;
            --fallo: #f44336;
            --ambar: #ffc107;
            --naranja: #ff9800;
            --azul: #2196f3;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg);
            color: var(--white);
            padding: 8px;
            line-height: 1.4;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            background: var(--card);
            padding: 12px;
            border-radius: var(--radius);
            box-shadow: 0 4px 8px rgba(0,0,0,0.5);
            border: 1px solid #333;
            flex: 1;
        }

        h1 {
            text-align: center;
            color: var(--white);
            font-size: 2.2rem;
            margin: 0 0 10px 0;
            padding: 0;
            font-weight: bold;
        }

        h2 {
            color: var(--white);
            font-size: 1.2rem;
            margin: 0 0 10px 0;
            border-left: 4px solid var(--accent);
            padding-left: 8px;
        }

        h3 {
            color: var(--white);
            font-size: 1.1rem;
            margin: 10px 0;
        }

        h4 {
            color: var(--white);
            margin: 10px 0 5px 0;
            font-size: 1rem;
        }

        .nav {
            display: flex;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 20;
            background: var(--card);
            border-bottom: 2px solid var(--accent);
            margin-bottom: 12px;
        }

        .nav button {
            flex: 1 1 0;
            padding: 12px 4px;
            border: none;
            border-radius: 0;
            background: transparent;
            color: var(--gray);
            font-weight: bold;
            cursor: pointer;
            font-size: 0.9rem;
            transition: background 0.2s;
            min-width: 60px;
        }

        .nav button:hover {
            background: #333;
        }

        .nav button.active {
            background: var(--accent);
            color: var(--white);
        }

        .tab {
            display: none;
        }

        .tab.active {
            display: block;
        }

        .grid-2 {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        @media (min-width: 768px) {
            .grid-2 {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 15px;
            }
        }

        .panel {
            background: #222;
            border: 1px solid #333;
            padding: 12px;
            border-radius: var(--radius);
            margin-bottom: 12px;
        }

        .panel:last-child {
            margin-bottom: 0;
        }

        .panel h3 {
            margin-top: 0;
            margin-bottom: 10px;
        }

        .filter-group {
            margin-bottom: 12px;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 4px;
            color: #ddd;
            font-size: 0.9rem;
        }

        .filter-group select, .filter-group input {
            width: 100%;
            padding: 10px;
            border: 2px solid #444;
            border-radius: var(--radius);
            font-size: 16px;
            background-color: #333;
            color: var(--white);
            cursor: pointer;
        }

        .monster-list {
            max-height: 350px;
            overflow-y: auto;
            border: 1px solid #444;
            border-radius: var(--radius);
            padding: 8px;
            background: #1a1a1a;
        }

        .monster-item {
            padding: 10px;
            margin: 4px 0;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .monster-item:hover {
            border-color: var(--accent);
            background: #3a3a3a;
        }

        .monster-item.selected {
            border-left: 4px solid var(--azul);
            background: #2a3a3a;
        }

        .monster-item .monster-name {
            font-weight: bold;
            font-size: 0.95rem;
        }

        .monster-item .monster-cr {
            background: var(--accent);
            padding: 2px 6px;
            border-radius: 12px;
            font-size: 0.7rem;
            color: white;
            white-space: nowrap;
        }

        .monster-detail-panel {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: var(--radius);
            padding: 15px;
            margin-top: 10px;
        }

        .monster-detail-panel h3 {
            border-bottom: 1px solid var(--accent);
            padding-bottom: 8px;
            margin-bottom: 12px;
        }

        .detail-row {
            display: flex;
            flex-wrap: wrap;
            margin-bottom: 8px;
            border-bottom: 1px dashed #333;
            padding-bottom: 5px;
            font-size: 0.9rem;
        }

        .detail-label {
            font-weight: bold;
            min-width: 90px;
            color: #aaa;
        }

        .detail-value {
            color: var(--white);
            flex: 1;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            margin: 12px 0;
            text-align: center;
        }

        @media (min-width: 480px) {
            .stats-grid {
                grid-template-columns: repeat(6, 1fr);
            }
        }

        .stat-block {
            background: #333;
            padding: 6px;
            border-radius: 4px;
            font-size: 0.85rem;
        }

        .stat-block .stat-name {
            font-weight: bold;
            color: var(--accent);
        }

        .stat-block .stat-value {
            font-size: 1rem;
        }

        .action-block {
            background: #222;
            border-left: 3px solid var(--exito);
            padding: 8px;
            margin: 8px 0;
            font-size: 0.9rem;
        }

        .action-block .action-name {
            font-weight: bold;
            color: var(--exito);
            margin-bottom: 4px;
        }

        .action-block .action-desc {
            color: #ccc;
            font-size: 0.85rem;
        }

        .btn {
            background: var(--gray);
            color: white;
            border: none;
            padding: 12px 16px;
            border-radius: var(--radius);
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.2s;
            margin: 4px;
            display: inline-block;
            text-align: center;
        }

        .btn:hover {
            background: var(--accent);
        }

        .btn-primary {
            background: var(--exito);
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 0.9rem;
        }

        .hidden {
            display: none !important;
        }

        .message-bar {
            background: var(--exito);
            color: white;
            padding: 8px;
            border-radius: var(--radius);
            margin: 8px 0;
            text-align: center;
            font-size: 0.9rem;
            animation: fadeOut 3s forwards;
        }

        @keyframes fadeOut {
            0% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        textarea {
            background: #333;
            color: #fff;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            font-family: inherit;
            font-size: 1rem;
            width: 100%;
        }

        /* Estilos para la pestaña de combate */
        .combatant-list {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: var(--radius);
            padding: 8px;
            min-height: 300px;
            max-height: 500px;
            overflow-y: auto;
        }

        .combatant-row {
            background: #2a2a2a;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 8px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            transition: all 0.2s;
            cursor: grab;
        }

        @media (min-width: 640px) {
            .combatant-row {
                display: grid;
                grid-template-columns: auto 1fr auto auto auto auto auto;
                align-items: center;
                gap: 8px;
                padding: 8px;
            }
        }

        .combatant-row.current-turn {
            border-left: 5px solid var(--exito);
            background: #2a3a2a;
        }

        .combatant-row.dragging {
            opacity: 0.5;
            cursor: grabbing;
        }

        .combatant-row-top {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .combatant-drag-handle {
            color: #888;
            font-size: 1.2rem;
            cursor: grab;
            user-select: none;
        }

        .combatant-name {
            font-weight: bold;
            flex: 1;
            font-size: 1rem;
        }

        .combatant-name.pc {
            color: var(--azul);
        }

        .combatant-name.npc {
            color: var(--ambar);
        }

        .combatant-row-fields {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .combatant-initiative {
            width: 70px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px;
            color: var(--white);
            text-align: center;
            font-size: 1rem;
        }

        .combatant-hp {
            display: flex;
            align-items: center;
            gap: 4px;
            flex: 1;
            min-width: 120px;
        }

        .combatant-hp input {
            width: 70px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px;
            color: var(--white);
            text-align: center;
        }

        .combatant-hp .hp-max {
            color: #aaa;
            font-size: 0.85rem;
        }

        .combatant-ac {
            width: 60px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px;
            color: var(--white);
            text-align: center;
            font-weight: bold;
        }

        .combatant-conditions {
            flex: 2;
            min-width: 150px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 6px;
            color: var(--white);
            font-size: 0.9rem;
        }

        .combatant-actions {
            display: flex;
            gap: 4px;
            flex-wrap: wrap;
            margin-top: 4px;
        }

        .combatant-actions button {
            width: 40px;
            height: 40px;
            padding: 0;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 4px;
            flex: 1 0 auto;
        }

        .btn-hp-minus {
            background: var(--fallo);
        }

        .btn-hp-plus {
            background: var(--exito);
        }

        .btn-remove {
            background: #555;
            color: white;
        }

        .combatant-states {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin-top: 5px;
            padding-top: 5px;
            border-top: 1px dashed #444;
        }

        .combat-controls-top {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            justify-content: center;
            margin-bottom: 12px;
        }

        .combat-controls-top .btn {
            flex: 1 1 auto;
            min-width: 100px;
            margin: 0;
        }

        .condition-quick-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
            margin: 10px 0;
            justify-content: center;
        }

        .condition-btn {
            background: #444;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            cursor: pointer;
            flex: 0 1 auto;
        }

        .condition-btn:hover {
            background: var(--accent);
        }

        .combat-log {
            background: #1a1a1a;
            border: 1px solid #444;
            border-radius: var(--radius);
            padding: 10px;
            margin-top: 15px;
            max-height: 150px;
            overflow-y: auto;
        }

        .log-entry {
            padding: 4px 0;
            border-bottom: 1px dashed #333;
            font-size: 0.8rem;
            color: #ccc;
        }

        .log-time {
            color: var(--accent);
            margin-right: 4px;
            font-size: 0.7rem;
        }

        /* Modal para móvil */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 10px;
        }

        .modal-content {
            background: var(--card);
            padding: 20px;
            border-radius: var(--radius);
            width: 100%;
            max-width: 400px;
            border: 2px solid var(--accent);
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal-content h3 {
            margin-bottom: 15px;
            text-align: center;
        }

        .modal-body label {
            display: block;
            margin: 10px 0 4px;
            color: #ddd;
            font-size: 0.9rem;
        }

        .modal-body input, .modal-body select {
            width: 100%;
            padding: 10px;
            background: #333;
            border: 1px solid #555;
            border-radius: 4px;
            color: var(--white);
            margin-bottom: 10px;
            font-size: 16px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
            justify-content: center;
        }

        .modal-buttons button {
            flex: 1;
        }
        
        /* Estilos específicos para la lista de monstruos en el modal */
        .modal-monster-list {
            max-height: 300px;
            overflow-y: auto;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 5px;
            background: #1a1a1a;
            margin: 10px 0;
        }

        .modal-monster-item {
            padding: 10px;
            margin: 4px 0;
            background: #333;
            border: 1px solid #444;
            border-radius: 4px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-monster-item:hover {
            border-color: var(--accent);
            background: #3a3a3a;
        }

        .modal-monster-item.selected {
            border-left: 4px solid var(--azul);
            background: #2a3a3a;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>DM</h1>

    <!-- Navegación -->
    <nav class="nav">
        <button class="active" onclick="switchTab('combat', event)">⚔️</button>
        <button onclick="switchTab('bestiary', event)">📚</button>
        <button onclick="switchTab('items', event)">⚱️</button>
        <button onclick="switchTab('notes', event)">📝</button>
    </nav>

    <!-- ==================== PESTAÑA COMBATE ==================== -->
    <section id="combat" class="tab active">
        <div class="panel">
            <div class="combat-controls-top">
                <button class="btn btn-sm" onclick="openAddPlayerModal()">➕ PJ</button>
                <button class="btn btn-sm" onclick="openAddMonsterModal()">📖 Monstruo</button>
                <button class="btn btn-sm btn-primary" onclick="nextTurn()">⏭️ Siguiente</button>
            </div>
            
            <!-- Condiciones rápidas -->
            <div class="condition-quick-buttons">
                <button class="condition-btn" onclick="addConditionToCurrent('Cegado')">Cegado</button>
                <button class="condition-btn" onclick="addConditionToCurrent('Envenenado')">Envenenado</button>
                <button class="condition-btn" onclick="addConditionToCurrent('Paralizado')">Paralizado</button>
                <button class="condition-btn" onclick="addConditionToCurrent('Aturdido')">Aturdido</button>
                <button class="condition-btn" onclick="addConditionToCurrent('Inconsciente')">Inconsciente</button>
            </div>
            
            <!-- Contenedor para TODOS los botones de estado (como en la ficha) -->
            <div id="stateButtonsContainer" class="condition-quick-buttons" style="margin-top: 15px; border-top: 1px solid #444; padding-top: 10px;">
                <!-- Se llenará dinámicamente con JS -->
            </div>
            
            <!-- Lista de combatientes -->
            <div id="combatantList" class="combatant-list">
                <p style="color: #666; text-align: center; padding: 20px;">No hay combatientes.</p>
            </div>
            
            <!-- Historial -->
            <div class="combat-log">
                <h4 style="margin:0 0 6px 0; font-size:0.9rem;">Historial</h4>
                <div id="logEntries">
                    <div class="log-entry">Sistema listo</div>
                </div>
            </div>
            
            <!-- Controles de orden -->
            <div style="display: flex; gap: 8px; margin-top: 10px; justify-content: center; flex-wrap: wrap;">
                <button class="btn btn-sm" onclick="sortByInitiative()">🔢 Ordenar</button>
                <button class="btn btn-sm" onclick="rollInitiativeForAll()">🎲 Iniciativas</button>
                <button class="btn btn-sm" onclick="resetCombat()">🔄 Reiniciar</button>
            </div>
        </div>
    </section>

    <!-- ==================== PESTAÑA BESTIARIO ==================== -->
    <section id="bestiary" class="tab">
        <div class="grid-2">
            <div>
                <div class="panel">
                    <h3>Filtros</h3>
                    <div class="filter-group">
                        <label>CR</label>
                        <select id="filterCR">
                            <option value="all">Todos</option>
                            <option value="0">CR 0</option>
                            <option value="0.125">CR 1/8</option>
                            <option value="0.25">CR 1/4</option>
                            <option value="0.5">CR 1/2</option>
                            <option value="1">CR 1</option>
                            <option value="2">CR 2</option>
                            <option value="3">CR 3</option>
                            <option value="4">CR 4</option>
                            <option value="5">CR 5</option>
                            <option value="6">CR 6</option>
                            <option value="7">CR 7</option>
                            <option value="8">CR 8</option>
                            <option value="9">CR 9</option>
                            <option value="10">CR 10</option>
                            <option value="11">CR 11</option>
                            <option value="12">CR 12</option>
                            <option value="13">CR 13</option>
                            <option value="14">CR 14</option>
                            <option value="15">CR 15</option>
                            <option value="16">CR 16</option>
                            <option value="17">CR 17</option>
                            <option value="18">CR 18</option>
                            <option value="19">CR 19</option>
                            <option value="20">CR 20</option>
                            <option value="21">CR 21</option>
                            <option value="22">CR 22</option>
                            <option value="23">CR 23</option>
                            <option value="24">CR 24</option>
                            <option value="25">CR 25</option>
                            <option value="26">CR 26</option>
                            <option value="27">CR 27</option>
                            <option value="28">CR 28</option>
                            <option value="29">CR 29</option>
                            <option value="30">CR 30</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Tipo</label>
                        <select id="filterType">
                            <option value="all">Todos</option>
                            <option value="Aberración">Aberración</option>
                            <option value="Bestia">Bestia</option>
                            <option value="Celestial">Celestial</option>
                            <option value="Dragón">Dragón</option>
                            <option value="Elemental">Elemental</option>
                            <option value="Humanoide">Humanoide</option>
                            <option value="No muerto">No-muerto</option>
                            <option value="Infernal">Infernal</option>
                            <option value="Gigante">Gigante</option>
                            <option value="Monstruosidad">Monstruosidad</option>
                            <option value="Fey">Fey</option>
                            <option value="Planta">Planta</option>
                            <option value="Constructo">Constructo</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Buscar</label>
                        <input type="text" id="filterSearch" placeholder="Nombre...">
                    </div>
                    <button class="btn btn-sm" onclick="applyFilters()">Aplicar</button>
                </div>

                <div class="panel">
                    <h3>Criaturas</h3>
                    <div id="monsterList" class="monster-list">
                        <p style="color: #666; text-align: center;">Selecciona filtros</p>
                    </div>
                </div>
            </div>

            <div>
                <div id="monsterDetail" class="monster-detail-panel">
                    <h3>Detalle</h3>
                    <p style="color: #666; text-align: center;">Selecciona una criatura</p>
                </div>
            </div>
        </div>
    </section>

    <!-- ==================== PESTAÑA OBJETOS ==================== -->
    <section id="items" class="tab">
        <div class="grid-2">
            <div>
                <div class="panel">
                    <h3>Filtros</h3>
                    <div class="filter-group">
                        <label>Categoría</label>
                        <select id="filterItemCategory">
                            <option value="all">Todas</option>
                            <option value="Arma">Arma</option>
                            <option value="Arma Mágica">Arma Mágica</option>
                            <option value="Armadura">Armadura</option>
                            <option value="Anillo">Anillo</option>
                            <option value="Poción">Poción</option>
                            <option value="Objeto Maravilloso">Maravilloso</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Rareza</label>
                        <select id="filterItemRarity">
                            <option value="all">Todas</option>
                            <option value="Común">Común</option>
                            <option value="Poco común">Poco común</option>
                            <option value="Raro">Raro</option>
                            <option value="Muy raro">Muy raro</option>
                            <option value="Legendario">Legendario</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label>Buscar</label>
                        <input type="text" id="filterItemSearch" placeholder="Nombre...">
                    </div>
                    <button class="btn btn-sm" onclick="applyItemFilters()">Aplicar</button>
                </div>

                <div class="panel">
                    <h3>Objetos</h3>
                    <div id="itemList" class="monster-list">
                        <p style="color: #666; text-align: center;">Selecciona filtros</p>
                    </div>
                </div>
            </div>

            <div>
                <div id="itemDetail" class="monster-detail-panel">
                    <h3>Detalle</h3>
                    <p style="color: #666; text-align: center;">Selecciona un objeto</p>
                </div>
            </div>
        </div>
    </section>

    <!-- ==================== PESTAÑA NOTAS ==================== -->
    <section id="notes" class="tab">
        <div class="panel">
            <h2>Notas</h2>
            <textarea id="dmNotes" placeholder="Escribe tus notas..." style="min-height: 300px;"></textarea>
            <p style="color: #aaa; font-size: 0.7rem; margin-top: 4px; text-align: center;">Autoguardado</p>
        </div>
    </section>
</div>

<!-- ==================== MODAL PARA AÑADIR MONSTRUOS ==================== -->
<div id="monsterModal" class="modal-overlay" style="display: none;">
    <div class="modal-content">
        <h3>Añadir Monstruo</h3>
        <div class="modal-body">
            <!-- Buscador -->
            <label for="modalMonsterSearch">Buscar por nombre:</label>
            <input type="text" id="modalMonsterSearch" placeholder="Ej. Goblin, Dragón...">

            <!-- Lista de monstruos (se llenará con JS) -->
            <label>Selecciona un monstruo:</label>
            <div id="modalMonsterList" class="modal-monster-list">
                <!-- Aquí irán los monstruos cargados desde BESTIARIO -->
                <p style="color: #666; text-align: center; padding: 10px;">Cargando monstruos...</p>
            </div>
            
            <!-- ID Oculto para almacenar la selección actual -->
            <input type="hidden" id="selectedMonsterId" value="">
            
            <!-- Mensaje de confirmación visual -->
            <div id="modalSelectedMessage" style="color: #4caf50; text-align: center; min-height: 20px; margin-top: 5px;"></div>
        </div>
        <div class="modal-buttons">
            <button class="btn btn-sm" id="cancelMonsterBtn">Cancelar</button>
            <button class="btn btn-sm btn-primary" id="confirmMonsterBtn">Añadir</button>
        </div>
    </div>
</div>
