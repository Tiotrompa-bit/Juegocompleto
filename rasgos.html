<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rasgos — D&D 5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#0d0d0d; --surface:#141414; --card:#1a1a1a; --card2:#1f1f1f;
  --border:#2a2a2a; --border2:#333;
  --red:#c62828; --red2:#e53935; --gold:#c8a84b; --gold2:#e8c87a;
  --text:#e8e0d0; --muted:#888; --dim:#555;
  --green:#4caf50; --blue:#42a5f5; --purple:#ab47bc; --orange:#ff7043;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;min-height:100vh;}

/* NAV */
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);text-decoration:none;white-space:nowrap;}
.topbar-nav{display:flex;gap:4px;margin-left:auto;}
.topbar-nav a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:var(--radius);font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.5px;transition:all 0.2s;}
.topbar-nav a:hover{color:var(--gold);background:rgba(200,168,75,0.08);}
.topbar-nav a.active{color:var(--gold);background:rgba(200,168,75,0.12);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 49px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
.main{padding:24px;overflow-y:auto;}

/* SIDEBAR */
.sidebar h3{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;margin-top:20px;}
.sidebar h3:first-child{margin-top:0;}
.search-wrap{position:relative;margin-bottom:4px;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.95rem;}
.search-wrap::before{content:'⚔';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;}
.search-wrap input:focus{outline:none;border-color:var(--gold);background:var(--card2);}

.filter-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.78rem;cursor:pointer;transition:all 0.2s;font-family:'Cinzel',serif;letter-spacing:0.3px;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;}

.prop-list{display:flex;flex-direction:column;gap:4px;}
.prop-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.88rem;color:var(--muted);padding:3px 0;}
.prop-check input{accent-color:var(--gold);width:14px;height:14px;}
.prop-check:hover{color:var(--text);}

.btn-reset{width:100%;padding:8px;margin-top:16px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:1px;transition:all 0.2s;}
.btn-reset:hover{border-color:var(--red);color:var(--red);}

/* MAIN AREA */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.results-count{color:var(--muted);font-size:0.88rem;margin-right:auto;}
.results-count strong{color:var(--gold);}
.sort-select{padding:8px 12px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;cursor:pointer;}
.sort-select:focus{outline:none;border-color:var(--gold);}

/* GRID VIEW */
#traitsGrid.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
#traitsGrid.list-view{display:flex;flex-direction:column;gap:6px;}

/* TRAIT CARD */
.trait-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.trait-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--type-color,var(--dim));opacity:0.7;transition:opacity 0.2s;}
.trait-card:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px);}
.trait-card:hover::before{opacity:1;}
.trait-card.selected{border-color:var(--gold);background:var(--card2);}
.trait-card.selected::before{opacity:1;}

/* Grid layout */
.grid-view .trait-card{padding:16px;}
.grid-view .trait-header{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.grid-view .trait-icon{font-size:1.6rem;}
.grid-view .trait-name{font-family:'Cinzel',serif;font-size:0.95rem;color:var(--text);flex:1;line-height:1.3;}
.grid-view .trait-source{font-size:0.7rem;color:var(--muted);background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:10px;}
.grid-view .trait-prereq{font-size:0.8rem;color:var(--orange);margin-bottom:8px;font-style:italic;}
.grid-view .trait-desc{font-size:0.85rem;color:var(--muted);line-height:1.5;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.grid-view .trait-tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:10px;}
.grid-view .trait-benefit{font-size:0.8rem;color:var(--green);margin-top:8px;}

/* List layout */
.list-view .trait-card{padding:12px 16px;display:grid;grid-template-columns:2rem 1fr auto;align-items:center;gap:12px;}
.list-view .trait-icon{font-size:1.3rem;}
.list-view .trait-name{font-family:'Cinzel',serif;font-size:0.9rem;}
.list-view .trait-prereq{font-size:0.75rem;color:var(--orange);}
.list-view .trait-source{font-size:0.7rem;color:var(--muted);background:rgba(255,255,255,0.05);padding:2px 8px;border-radius:10px;}
.list-view .trait-desc{display:none;}

/* DETAIL PANEL */
.detail-panel{position:fixed;right:0;top:49px;bottom:0;width:400px;background:var(--surface);border-left:1px solid var(--border);padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;z-index:90;}
.detail-panel.open{transform:translateX(0);}
.detail-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:4px 8px;}
.detail-close:hover{color:var(--text);}
.detail-icon{font-size:3rem;display:block;margin-bottom:12px;}
.detail-name{font-family:'Cinzel',serif;font-size:1.4rem;color:var(--gold);margin-bottom:4px;line-height:1.3;}
.detail-source{font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-family:'Cinzel',serif;}
.detail-prereq{background:rgba(255,152,0,0.1);border:1px solid var(--orange);border-radius:var(--radius);padding:10px;margin-bottom:16px;}
.detail-prereq-label{font-size:0.7rem;color:var(--orange);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'Cinzel',serif;}
.detail-prereq-text{font-size:0.9rem;color:var(--text);}
.detail-section{margin-bottom:20px;}
.detail-section h4{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.detail-desc{font-size:0.95rem;line-height:1.8;color:var(--text);white-space:pre-line;}
.detail-benefit{background:rgba(76,175,80,0.08);border-left:3px solid var(--green);padding:12px;margin:10px 0;border-radius:0 var(--radius) var(--radius) 0;}
.detail-benefit-title{color:var(--green);font-family:'Cinzel',serif;font-size:0.8rem;margin-bottom:4px;}
.detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;}
.detail-tag{padding:4px 12px;border-radius:12px;font-size:0.75rem;border:1px solid;font-family:'Cinzel',serif;}
.tag-combate{color:var(--red);border-color:var(--red);background:rgba(198,40,40,0.08);}
-tag-magia{color:var(--purple);border-color:var(--purple);background:rgba(171,71,188,0.08);}
.tag-habilidad{color:var(--blue);border-color:var(--blue);background:rgba(66,165,245,0.08);}
.tag-social{color:var(--gold);border-color:var(--gold);background:rgba(200,168,75,0.08);}
.tag-defensa{color:var(--green);border-color:var(--green);background:rgba(76,175,80,0.08);}
.tag-default{color:var(--muted);border-color:var(--border);}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:var(--dim);}
.empty span{font-size:3rem;display:block;margin-bottom:12px;}
.empty p{font-size:1rem;color:var(--muted);}

/* PAGE */
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:24px;}
.page-btn{padding:7px 13px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.8rem;transition:all 0.2s;}
.page-btn:hover:not(:disabled):not(.active){border-color:var(--gold);color:var(--gold);}
.page-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
.page-btn:disabled{opacity:0.3;cursor:default;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .detail-panel{width:100%;top:49px;}
  .topbar-nav a { padding: 5px 7px; font-size: 0.62rem; }
}
</style>
</head>
<body>

<nav class="topbar">
  <a class="topbar-logo" href="index.html">⚔ D&D 5e</a>
  <div class="topbar-nav">

    <a href="creador.html">Creador</a>
    <a href="tienda.html">Tienda</a>
    <a href="grimorio.html">Grimorio</a>

    <a href="rasgos.html" class="active">Rasgos</a>

  </div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Buscar</h3>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Nombre del rasgo..." oninput="filterAndRender()">
    </div>

    <h3>Fuente</h3>
    <div class="filter-chips" id="sourceChips">
      <div class="chip on" data-source="all">Todas</div>
      <div class="chip" data-source="phb">Manual del Jugador</div>
      <div class="chip" data-source="xge">Xanathar</div>
      <div class="chip" data-source="tasha">Tasha</div>
      <div class="chip" data-source="homebrew">Homebrew</div>
    </div>

    <h3>Categoría</h3>
    <div class="filter-chips" id="catChips">
      <div class="chip on" data-cat="all">Todos</div>
      <div class="chip" data-cat="combate">Combate</div>
      <div class="chip" data-cat="magia">Magia</div>
      <div class="chip" data-cat="habilidad">Habilidad</div>
      <div class="chip" data-cat="social">Social</div>
      <div class="chip" data-cat="defensa">Defensa</div>
    </div>

    <h3>Prerrequisitos</h3>
    <div class="prop-list" id="prereqFilters">
      <label class="prop-check"><input type="checkbox" data-prereq="none" onchange="filterAndRender()"> Sin requisitos</label>
      <label class="prop-check"><input type="checkbox" data-prereq="fuerza" onchange="filterAndRender()"> Fuerza</label>
      <label class="prop-check"><input type="checkbox" data-prereq="destreza" onchange="filterAndRender()"> Destreza</label>
      <label class="prop-check"><input type="checkbox" data-prereq="constitucion" onchange="filterAndRender()"> Constitución</label>
      <label class="prop-check"><input type="checkbox" data-prereq="inteligencia" onchange="filterAndRender()"> Inteligencia</label>
      <label class="prop-check"><input type="checkbox" data-prereq="sabiduria" onchange="filterAndRender()"> Sabiduría</label>
      <label class="prop-check"><input type="checkbox" data-prereq="carisma" onchange="filterAndRender()"> Carisma</label>
      <label class="prop-check"><input type="checkbox" data-prereq="nivel" onchange="filterAndRender()"> Nivel específico</label>
      <label class="prop-check"><input type="checkbox" data-prereq="competencia" onchange="filterAndRender()"> Competencia</label>
      <label class="prop-check"><input type="checkbox" data-prereq="raza" onchange="filterAndRender()"> Raza específica</label>
    </div>

    <button class="btn-reset" onclick="resetFilters()">✕ Limpiar Filtros</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="toolbar">
      <div class="results-count"><strong id="countNum">0</strong> rasgos encontrados</div>
      <select class="sort-select" id="sortSel" onchange="filterAndRender()">
        <option value="nombre">Nombre A→Z</option>
        <option value="nombre_desc">Nombre Z→A</option>
        <option value="source">Fuente</option>
      </select>
    </div>

    <div id="traitsGrid" class="grid-view"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detailContent"></div>
</div>

<script>

const TRAITS = [

/* =====================================================
   LÓGICA DE FILTRADO Y RENDERIZADO
   ===================================================== */
let currentPage = 1;
const PER_PAGE = 20;
let filtered = [...TRAITS];
let selectedId = null;

// CHIPS
document.querySelectorAll('#sourceChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#sourceChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});
document.querySelectorAll('#catChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#catChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});

function filterAndRender() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const source = document.querySelector('#sourceChips .chip.on')?.dataset.source || 'all';
  const cat = document.querySelector('#catChips .chip.on')?.dataset.cat || 'all';
  const activePrereq = [...document.querySelectorAll('[data-prereq]:checked')].map(cb => cb.dataset.prereq);
  const sort = document.getElementById('sortSel').value;

  filtered = TRAITS.filter(trait => {
    if (q && !trait.nombre.toLowerCase().includes(q) && !trait.desc.toLowerCase().includes(q)) return false;
    if (source !== 'all' && trait.source !== source) return false;
    if (cat !== 'all' && trait.cat !== cat) return false;
    if (activePrereq.length > 0) {
      const prereqMatch = activePrereq.some(pr => {
        if (pr === 'none') return trait.prereqTipo === 'none';
        return trait.prereq.toLowerCase().includes(pr) || trait.prereqTipo === pr;
      });
      if (!prereqMatch) return false;
    }
    return true;
  });

  // SORT
  filtered.sort((a, b) => {
    if (sort === 'nombre') return a.nombre.localeCompare(b.nombre,'es');
    if (sort === 'nombre_desc') return b.nombre.localeCompare(a.nombre,'es');
    if (sort === 'source') return a.source.localeCompare(b.source) || a.nombre.localeCompare(b.nombre,'es');
    return 0;
  });

  currentPage = 1;
  render();
}

function render() {
  const grid = document.getElementById('traitsGrid');
  const start = (currentPage-1)*PER_PAGE;
  const page = filtered.slice(start, start+PER_PAGE);

  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><span>🔍</span><h3>Sin resultados</h3><p>Prueba con otros filtros o búsqueda</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const typeColor = getTypeColor(page[0]?.cat || 'combate');
  
  grid.innerHTML = page.map(trait => {
    const hasPrereq = trait.prereq !== 'Ninguno';
    return `<div class="trait-card${trait.id===selectedId?' selected':''}" style="--type-color:${typeColor}" onclick="showDetail('${trait.id}')">
      <div class="trait-header">
        <span class="trait-icon">${trait.icono}</span>
        <span class="trait-name">${trait.nombre}</span>
        <span class="trait-source">${getSourceLabel(trait.source)}</span>
      </div>
      ${hasPrereq ? `<div class="trait-prereq">📋 ${trait.prereq}</div>` : ''}
      <div class="trait-desc">${trait.desc.substring(0, 150)}...</div>
      <div class="trait-tags">
        ${trait.beneficios.slice(0, 3).map(b => `<span class="tag" style="background:rgba(200,168,75,0.1);color:var(--gold);border:1px solid var(--gold);padding:2px 8px;border-radius:10px;font-size:0.7rem;">${b}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="gotoPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=1)
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===2)
      html += `<span style="color:var(--dim);padding:0 4px">…</span>`;
  }
  html += `<button class="page-btn" onclick="gotoPage(${currentPage+1})" ${currentPage===total?'disabled':''}>→</button>`;
  pg.innerHTML = html;
}

function gotoPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p<1||p>total) return;
  currentPage = p;
  render();
  document.querySelector('.main').scrollTop = 0;
}

function showDetail(id) {
  const trait = TRAITS.find(t=>t.id===id);
  if (!trait) return;
  selectedId = id;
  render();

  const tagClass = getTagClass(trait.cat);
  
  document.getElementById('detailContent').innerHTML = `
    <span class="detail-icon">${trait.icono}</span>
    <div class="detail-name">${trait.nombre}</div>
    <div class="detail-source">${getSourceLabel(trait.source)} • ${getCatLabel(trait.cat)}</div>
    
    ${trait.prereq !== 'Ninguno' ? `
    <div class="detail-prereq">
      <div class="detail-prereq-label">Prerrequisitos</div>
      <div class="detail-prereq-text">${trait.prereq}</div>
    </div>` : ''}
    
    <div class="detail-section">
      <h4>Descripción</h4>
      <div class="detail-desc">${trait.desc}</div>
    </div>
    
    <div class="detail-section">
      <h4>Beneficios Principales</h4>
      ${trait.beneficios.map(b => `
        <div class="detail-benefit">
          <div class="detail-benefit-title">✦ ${b}</div>
        </div>
      `).join('')}
    </div>
    
    <div class="detail-tags">
      <span class="detail-tag ${tagClass}">${getCatLabel(trait.cat)}</span>
      ${trait.prereqTipo !== 'none' ? `<span class="detail-tag tag-default">Con requisitos</span>` : '<span class="detail-tag tag-default">Sin requisitos</span>'}
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
  render();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('#sourceChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('#catChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('[data-prereq]').forEach(cb=>cb.checked=false);
  document.getElementById('sortSel').value = 'nombre';
  filterAndRender();
}

function getTypeColor(cat) {
  const m = {combate:'#e53935',magia:'#ab47bc',habilidad:'#42a5f5',social:'#c8a84b',defensa:'#4caf50'};
  return m[cat]||'#888';
}

function getTagClass(cat) {
  const m = {combate:'tag-combate',magia:'tag-magia',habilidad:'tag-habilidad',social:'tag-social',defensa:'tag-defensa'};
  return m[cat]||'tag-default';
}

function getSourceLabel(src) {
  const m = {phb:'DMG',xge:'Xanathar',tasha:'Tasha',homebrew:'Homebrew'};
  return m[src]||src.toUpperCase();
}

function getCatLabel(cat) {
  const m = {combate:'Combate',magia:'Magia',habilidad:'Habilidad',social:'Social',defensa:'Defensa'};
  return m[cat]||cat;
}

// INIT
filterAndRender();
</script>
