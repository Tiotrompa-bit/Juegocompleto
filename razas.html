<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Razas — D&D 5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#0d0d0d; --surface:#141414; --card:#1a1a1a; --card2:#1f1f1f;
  --border:#2a2a2a; --border2:#333;
  --red:#c62828; --red2:#e53935; --gold:#c8a84b; --gold2:#e8c87a;
  --text:#e8e0d0; --muted:#888; --dim:#555;
  --green:#4caf50; --blue:#42a5f5; --purple:#ab47bc; --orange:#ff7043;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;min-height:100vh;}

/* NAV */
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);text-decoration:none;white-space:nowrap;}
.topbar-nav{display:flex;gap:4px;margin-left:auto;}
.topbar-nav a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:var(--radius);font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.5px;transition:all 0.2s;}
.topbar-nav a:hover{color:var(--gold);background:rgba(200,168,75,0.08);}
.topbar-nav a.active{color:var(--gold);background:rgba(200,168,75,0.12);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 49px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
.main{padding:24px;overflow-y:auto;}

/* SIDEBAR */
.sidebar h3{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;margin-top:20px;}
.sidebar h3:first-child{margin-top:0;}
.search-wrap{position:relative;margin-bottom:4px;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.95rem;}
.search-wrap::before{content:'⚔';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;}
.search-wrap input:focus{outline:none;border-color:var(--gold);background:var(--card2);}

.filter-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.78rem;cursor:pointer;transition:all 0.2s;font-family:'Cinzel',serif;letter-spacing:0.3px;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;}

.range-row{display:flex;gap:8px;align-items:center;}
.range-row input{flex:1;padding:7px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;width:100%;}
.range-row input:focus{outline:none;border-color:var(--gold);}
.range-row span{color:var(--muted);font-size:0.85rem;}

.prop-list{display:flex;flex-direction:column;gap:4px;}
.prop-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.88rem;color:var(--muted);padding:3px 0;}
.prop-check input{accent-color:var(--gold);width:14px;height:14px;}
.prop-check:hover{color:var(--text);}

.btn-reset{width:100%;padding:8px;margin-top:16px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:1px;transition:all 0.2s;}
.btn-reset:hover{border-color:var(--red);color:var(--red);}

/* MAIN AREA */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.results-count{color:var(--muted);font-size:0.88rem;margin-right:auto;}
.results-count strong{color:var(--gold);}
.sort-select{padding:8px 12px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;cursor:pointer;}
.sort-select:focus{outline:none;border-color:var(--gold);}

/* GRID VIEW */
#racesGrid.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
#racesGrid.list-view{display:flex;flex-direction:column;gap:6px;}

/* RACE CARD */
.race-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.race-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--type-color,var(--dim));opacity:0.7;transition:opacity 0.2s;}
.race-card:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px);}
.race-card:hover::before{opacity:1;}
.race-card.selected{border-color:var(--gold);background:var(--card2);}
.race-card.selected::before{opacity:1;}

/* Grid layout */
.grid-view .race-card{padding:16px;}
.grid-view .race-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.grid-view .race-icon{font-size:2.2rem;}
.grid-view .race-title{flex:1;}
.grid-view .race-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--text);margin-bottom:2px;}
.grid-view .race-source{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.grid-view .race-stats{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.grid-view .race-stat{background:rgba(200,168,75,0.1);border:1px solid var(--gold);color:var(--gold);padding:3px 8px;border-radius:4px;font-size:0.75rem;font-family:'Cinzel',serif;}
.grid-view .race-abilities{font-size:0.85rem;color:var(--muted);margin-bottom:8px;line-height:1.4;}
.grid-view .race-abilities strong{color:var(--text);}
.grid-view .race-traits{display:flex;flex-wrap:wrap;gap:4px;}
.grid-view .race-trait{background:var(--card2);border:1px solid var(--border2);color:var(--muted);padding:2px 8px;border-radius:10px;font-size:0.7rem;}

/* List layout */
.list-view .race-card{padding:12px 16px;display:grid;grid-template-columns:2.5rem 1fr auto auto;align-items:center;gap:12px;}
.list-view .race-icon{font-size:1.8rem;}
.list-view .race-name{font-family:'Cinzel',serif;font-size:0.9rem;}
.list-view .race-source{font-size:0.7rem;color:var(--muted);}
.list-view .race-stats{display:flex;gap:6px;}
.list-view .race-stat{font-size:0.7rem;padding:2px 6px;}
.list-view .race-abilities{display:none;}

/* DETAIL PANEL */
.detail-panel{position:fixed;right:0;top:49px;bottom:0;width:420px;background:var(--surface);border-left:1px solid var(--border);padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;z-index:90;}
.detail-panel.open{transform:translateX(0);}
.detail-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:4px 8px;}
.detail-close:hover{color:var(--text);}
.detail-icon{font-size:3.5rem;display:block;margin-bottom:12px;}
.detail-name{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold);margin-bottom:4px;line-height:1.3;}
.detail-source{font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-family:'Cinzel',serif;}
.detail-section{margin-bottom:20px;}
.detail-section h4{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.detail-desc{font-size:0.95rem;line-height:1.7;color:var(--text);margin-bottom:12px;}

/* Stats block */
.stats-block{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:10px;text-align:center;}
.stat-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'Cinzel',serif;}
.stat-value{font-size:1.1rem;color:var(--gold);font-weight:600;}

/* Ability bonuses */
.ability-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:16px;}
.ability-item{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:10px;display:flex;justify-content:space-between;align-items:center;}
.ability-name{font-size:0.85rem;color:var(--text);}
.ability-bonus{font-size:0.9rem;color:var(--green);font-weight:600;}

/* Traits list */
.trait-item{background:var(--card);border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;padding:12px;margin-bottom:10px;}
.trait-name{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);margin-bottom:6px;}
.trait-desc{font-size:0.88rem;color:var(--muted);line-height:1.5;}

/* Subraces */
.subrace-section{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.subrace-name{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.subrace-name::before{content:'◆';color:var(--gold);font-size:0.7rem;}
.subrace-abilities{font-size:0.85rem;color:var(--muted);margin-bottom:8px;}
.subrace-trait{font-size:0.85rem;color:var(--text);padding:6px 0;border-top:1px solid var(--border2);}
.subrace-trait:first-of-type{border-top:none;}

/* Tags */
.detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;}
.detail-tag{padding:4px 12px;border-radius:12px;font-size:0.75rem;border:1px solid;font-family:'Cinzel',serif;}
.tag-common{color:var(--green);border-color:var(--green);background:rgba(76,175,80,0.08);}
.tag-uncommon{color:var(--blue);border-color:var(--blue);background:rgba(66,165,245,0.08);}
.tag-rare{color:var(--purple);border-color:var(--purple);background:rgba(171,71,188,0.08);}
.tag-monstrous{color:var(--orange);border-color:var(--orange);background:rgba(255,112,67,0.08);}
.tag-default{color:var(--muted);border-color:var(--border);}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:var(--dim);}
.empty span{font-size:3rem;display:block;margin-bottom:12px;}
.empty p{font-size:1rem;color:var(--muted);}

/* PAGE */
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:24px;}
.page-btn{padding:7px 13px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.8rem;transition:all 0.2s;}
.page-btn:hover:not(:disabled):not(.active){border-color:var(--gold);color:var(--gold);}
.page-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
.page-btn:disabled{opacity:0.3;cursor:default;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .detail-panel{width:100%;top:49px;}
  .topbar-nav a { padding: 5px 7px; font-size: 0.62rem; }
}
</style>
</head>

    <h3>Fuente</h3>

      <div class="chip" data-source="mtf">Mordenkainen</div>

      <div class="chip" data-type="exotico">Exótico</div>
      <div class="chip" data-type="monstruoso">Monstruoso</div>
    </div>

    <h3>Bonificación</h3>
    <div class="prop-list" id="abilityFilters">

      <label class="prop-check"><input type="checkbox" data-ability="variable" onchange="filterAndRender()"> Variable (+2/+1)</label>
    </div>

    <h3>Tamaño</h3>
    <div class="filter-chips" id="sizeChips">
      <div class="chip on" data-size="all">Todos</div>
      <div class="chip" data-size="Pequeño">Pequeño</div>
      <div class="chip" data-size="Mediano">Mediano</div>
    </div>

    <h3>Velocidad</h3>
    <div class="range-row">
      <input type="number" id="speedMin" placeholder="Min" min="0" oninput="filterAndRender()">
      <span>—</span>
      <input type="number" id="speedMax" placeholder="Max" min="0" oninput="filterAndRender()">
    </div>

    <button class="btn-reset" onclick="resetFilters()">✕ Limpiar Filtros</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="toolbar">
      <div class="results-count"><strong id="countNum">0</strong> razas encontradas</div>
      <select class="sort-select" id="sortSel" onchange="filterAndRender()">
        <option value="nombre">Nombre A→Z</option>
        <option value="nombre_desc">Nombre Z→A</option>
        <option value="source">Fuente</option>
      </select>
    </div>

    <div id="racesGrid" class="grid-view"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detailContent"></div>
</div>

/* =====================================================
   LÓGICA DE FILTRADO Y RENDERIZADO
   ===================================================== */
let currentPage = 1;
const PER_PAGE = 20;
let filtered = [...RACES];
let selectedId = null;

// CHIPS
document.querySelectorAll('#sourceChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#sourceChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});
document.querySelectorAll('#typeChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#typeChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});
document.querySelectorAll('#sizeChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#sizeChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});

function filterAndRender() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const source = document.querySelector('#sourceChips .chip.on')?.dataset.source || 'all';
  const type = document.querySelector('#typeChips .chip.on')?.dataset.type || 'all';
  const size = document.querySelector('#sizeChips .chip.on')?.dataset.size || 'all';
  const activeAbilities = [...document.querySelectorAll('[data-ability]:checked')].map(cb => cb.dataset.ability);
  const speedMin = parseInt(document.getElementById('speedMin').value) || 0;
  const speedMax = parseInt(document.getElementById('speedMax').value) || Infinity;
  const sort = document.getElementById('sortSel').value;

  filtered = RACES.filter(race => {
    if (q && !race.nombre.toLowerCase().includes(q) && !race.descripcion.toLowerCase().includes(q)) return false;
    if (source !== 'all' && race.source !== source) return false;
    if (type !== 'all' && race.type !== type) return false;
    if (size !== 'all' && race.stats.tamano !== size) return false;
    if (race.stats.velocidad < speedMin || race.stats.velocidad > speedMax) return false;
    if (activeAbilities.length > 0) {
      const abilityMatch = activeAbilities.some(ab => {
        if (ab === 'variable') return race.abilities.some(a => a.name.includes('Variable'));
        return race.abilities.some(a => a.name.toLowerCase().includes(ab));
      });
      if (!abilityMatch) return false;
    }
    return true;
  });

  // SORT
  filtered.sort((a, b) => {
    if (sort === 'nombre') return a.nombre.localeCompare(b.nombre,'es');
    if (sort === 'nombre_desc') return b.nombre.localeCompare(a.nombre,'es');
    if (sort === 'source') return a.source.localeCompare(b.source) || a.nombre.localeCompare(b.nombre,'es');
    return 0;
  });

  currentPage = 1;
  render();
}

function render() {
  const grid = document.getElementById('racesGrid');
  const start = (currentPage-1)*PER_PAGE;
  const page = filtered.slice(start, start+PER_PAGE);

  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><span>🔍</span><h3>Sin resultados</h3><p>Prueba con otros filtros o búsqueda</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const typeColor = getTypeColor(page[0]?.type || 'comun');
  
  grid.innerHTML = page.map(race => {
    const abilitiesText = race.abilities.map(a => `${a.name} ${a.bonus}`).join(', ');
    const traitsPreview = race.traits.slice(0, 3).map(t => t.name).join(' • ');
    
    return `<div class="race-card${race.id===selectedId?' selected':''}" style="--type-color:${typeColor}" onclick="showDetail('${race.id}')">
      <div class="race-header">
        <span class="race-icon">${race.icono}</span>
        <div class="race-title">
          <div class="race-name">${race.nombre}</div>
          <div class="race-source">${getSourceLabel(race.source)}</div>
        </div>
      </div>
      <div class="race-stats">
        <span class="race-stat">${race.stats.tamano}</span>
        <span class="race-stat">${race.stats.velocidad} pies</span>
        ${race.stats.vision !== '—' ? `<span class="race-stat">👁️</span>` : ''}
      </div>
      <div class="race-abilities"><strong>Habilidades:</strong> ${abilitiesText}</div>
      <div class="race-traits">
        ${traitsPreview.split(' • ').map(t => `<span class="race-trait">${t}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="gotoPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=1)
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===2)
      html += `<span style="color:var(--dim);padding:0 4px">…</span>`;
  }
  html += `<button class="page-btn" onclick="gotoPage(${currentPage+1})" ${currentPage===total?'disabled':''}>→</button>`;
  pg.innerHTML = html;
}

function gotoPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p<1||p>total) return;
  currentPage = p;
  render();
  document.querySelector('.main').scrollTop = 0;
}

          <div class="trait-name">${t.name}</div>
          <div class="trait-desc">${t.desc}</div>
        </div>
      `).join('')}
    </div>

    ${subracesHtml}

    <div class="detail-tags">
      <span class="detail-tag ${tagClass}">${getTypeLabel(race.type)}</span>
      <span class="detail-tag tag-default">${race.stats.tamano}</span>
      <span class="detail-tag tag-default">${race.stats.velocidad} pies</span>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
  render();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('#sourceChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('#typeChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('#sizeChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('[data-ability]').forEach(cb=>cb.checked=false);
  document.getElementById('speedMin').value = '';
  document.getElementById('speedMax').value = '';
  document.getElementById('sortSel').value = 'nombre';
  filterAndRender();
}

function getTypeColor(type) {
  const m = {comun:'#4caf50',exotico:'#42a5f5',monstruoso:'#ff7043'};
  return m[type]||'#888';
}

function getTagClass(type) {
  const m = {comun:'tag-common',exotico:'tag-uncommon',monstruoso:'tag-monstrous'};
  return m[type]||'tag-default';
}

function getSourceLabel(src) {
  const m = {phb:'DMG',vgm:'Volo',mtf:'Mordenkainen',eberron:'Eberron',homebrew:'Homebrew'};
  return m[src]||src.toUpperCase();
}

function getTypeLabel(type) {
  const m = {comun:'Común',exotico:'Exótico',monstruoso:'Monstruoso'};
  return m[type]||type;
}

// INIT
filterAndRender();
</script>
</body>
</html>
