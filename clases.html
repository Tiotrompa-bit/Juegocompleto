<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clases — D&D 5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#0d0d0d; --surface:#141414; --card:#1a1a1a; --card2:#1f1f1f;
  --border:#2a2a2a; --border2:#333;
  --red:#c62828; --red2:#e53935; --gold:#c8a84b; --gold2:#e8c87a;
  --text:#e8e0d0; --muted:#888; --dim:#555;
  --green:#4caf50; --blue:#42a5f5; --purple:#ab47bc; --orange:#ff7043;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;min-height:100vh;}

/* NAV */
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);text-decoration:none;white-space:nowrap;}
.topbar-nav{display:flex;gap:4px;margin-left:auto;}
.topbar-nav a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:var(--radius);font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.5px;transition:all 0.2s;}
.topbar-nav a:hover{color:var(--gold);background:rgba(200,168,75,0.08);}
.topbar-nav a.active{color:var(--gold);background:rgba(200,168,75,0.12);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 49px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
.main{padding:24px;overflow-y:auto;}

/* SIDEBAR */
.sidebar h3{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;margin-top:20px;}
.sidebar h3:first-child{margin-top:0;}
.search-wrap{position:relative;margin-bottom:4px;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.95rem;}
.search-wrap::before{content:'⚔';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;}
.search-wrap input:focus{outline:none;border-color:var(--gold);background:var(--card2);}

.filter-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.78rem;cursor:pointer;transition:all 0.2s;font-family:'Cinzel',serif;letter-spacing:0.3px;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;}

.range-row{display:flex;gap:8px;align-items:center;}
.range-row input{flex:1;padding:7px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;width:100%;}
.range-row input:focus{outline:none;border-color:var(--gold);}
.range-row span{color:var(--muted);font-size:0.85rem;}

.prop-list{display:flex;flex-direction:column;gap:4px;}
.prop-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.88rem;color:var(--muted);padding:3px 0;}
.prop-check input{accent-color:var(--gold);width:14px;height:14px;}
.prop-check:hover{color:var(--text);}

.btn-reset{width:100%;padding:8px;margin-top:16px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:1px;transition:all 0.2s;}
.btn-reset:hover{border-color:var(--red);color:var(--red);}

/* MAIN AREA */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.results-count{color:var(--muted);font-size:0.88rem;margin-right:auto;}
.results-count strong{color:var(--gold);}
.sort-select{padding:8px 12px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;cursor:pointer;}
.sort-select:focus{outline:none;border-color:var(--gold);}

/* GRID VIEW */
#classesGrid.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px;}
#classesGrid.list-view{display:flex;flex-direction:column;gap:6px;}

/* CLASS CARD */
.class-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.class-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--type-color,var(--dim));opacity:0.7;transition:opacity 0.2s;}
.class-card:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px);}
.class-card:hover::before{opacity:1;}
.class-card.selected{border-color:var(--gold);background:var(--card2);}
.class-card.selected::before{opacity:1;}

/* Grid layout */
.grid-view .class-card{padding:16px;}
.grid-view .class-header{display:flex;align-items:center;gap:12px;margin-bottom:12px;}
.grid-view .class-icon{font-size:2.2rem;}
.grid-view .class-title{flex:1;}
.grid-view .class-name{font-family:'Cinzel',serif;font-size:1rem;color:var(--text);margin-bottom:2px;}
.grid-view .class-source{font-size:0.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;}
.grid-view .class-stats{display:flex;gap:8px;margin-bottom:10px;flex-wrap:wrap;}
.grid-view .class-stat{background:rgba(200,168,75,0.1);border:1px solid var(--gold);color:var(--gold);padding:3px 8px;border-radius:4px;font-size:0.75rem;font-family:'Cinzel',serif;}
.grid-view .class-desc{font-size:0.85rem;color:var(--muted);margin-bottom:8px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.grid-view .class-features{display:flex;flex-wrap:wrap;gap:4px;}
.grid-view .class-feature{background:var(--card2);border:1px solid var(--border2);color:var(--muted);padding:2px 8px;border-radius:10px;font-size:0.7rem;}

/* List layout */
.list-view .class-card{padding:12px 16px;display:grid;grid-template-columns:2.5rem 1fr auto auto;align-items:center;gap:12px;}
.list-view .class-icon{font-size:1.8rem;}
.list-view .class-name{font-family:'Cinzel',serif;font-size:0.9rem;}
.list-view .class-source{font-size:0.7rem;color:var(--muted);}
.list-view .class-stats{display:flex;gap:6px;}
.list-view .class-stat{font-size:0.7rem;padding:2px 6px;}
.list-view .class-desc{display:none;}

/* DETAIL PANEL */
.detail-panel{position:fixed;right:0;top:49px;bottom:0;width:460px;background:var(--surface);border-left:1px solid var(--border);padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;z-index:90;}
.detail-panel.open{transform:translateX(0);}
.detail-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:4px 8px;}
.detail-close:hover{color:var(--text);}
.detail-icon{font-size:3.5rem;display:block;margin-bottom:12px;}
.detail-name{font-family:'Cinzel',serif;font-size:1.5rem;color:var(--gold);margin-bottom:4px;line-height:1.3;}
.detail-source{font-size:0.8rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-family:'Cinzel',serif;}
.detail-section{margin-bottom:20px;}
.detail-section h4{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:10px;border-bottom:1px solid var(--border);padding-bottom:6px;}
.detail-desc{font-size:0.95rem;line-height:1.7;color:var(--text);margin-bottom:12px;}

/* Stats block */
.stats-block{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
.stat-box{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:10px;text-align:center;}
.stat-label{font-size:0.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:4px;font-family:'Cinzel',serif;}
.stat-value{font-size:1.1rem;color:var(--gold);font-weight:600;}

/* Equipment list */
.equip-list{display:flex;flex-direction:column;gap:6px;margin-bottom:16px;}
.equip-item{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:10px;display:flex;justify-content:space-between;align-items:center;}
.equip-name{font-size:0.85rem;color:var(--text);}
.equip-type{font-size:0.75rem;color:var(--muted);font-family:'Cinzel',serif;}

/* Features list */
.feature-item{background:var(--card);border-left:3px solid var(--gold);border-radius:0 var(--radius) var(--radius) 0;padding:12px;margin-bottom:10px;}
.feature-name{font-family:'Cinzel',serif;font-size:0.85rem;color:var(--gold);margin-bottom:6px;}
.feature-level{font-size:0.7rem;color:var(--muted);float:right;font-family:'Cinzel',serif;}
.feature-desc{font-size:0.88rem;color:var(--muted);line-height:1.5;}

/* Subclasses */
.subclass-section{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:14px;margin-bottom:12px;}
.subclass-name{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--text);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.subclass-name::before{content:'◆';color:var(--gold);font-size:0.7rem;}
.subclass-desc{font-size:0.85rem;color:var(--muted);margin-bottom:8px;line-height:1.4;}
.subclass-feature{font-size:0.85rem;color:var(--text);padding:6px 0;border-top:1px solid var(--border2);}
.subclass-feature:first-of-type{border-top:none;}

/* Spellcasting block */
.spell-block{background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);padding:12px;margin-bottom:16px;}
.spell-title{font-family:'Cinzel',serif;font-size:0.8rem;color:var(--gold);margin-bottom:8px;}
.spell-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--border2);font-size:0.85rem;}
.spell-row:last-child{border-bottom:none;}
.spell-label{color:var(--muted);}
.spell-value{color:var(--text);}

/* Tags */
.detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:12px;}
.detail-tag{padding:4px 12px;border-radius:12px;font-size:0.75rem;border:1px solid;font-family:'Cinzel',serif;}
.tag-martial{color:var(--red);border-color:var(--red);background:rgba(198,40,40,0.08);}
.tag-spellcaster{color:var(--blue);border-color:var(--blue);background:rgba(66,165,245,0.08);}
.tag-halfcaster{color:var(--purple);border-color:var(--purple);background:rgba(171,71,188,0.08);}
-tag-default{color:var(--muted);border-color:var(--border);}

/* Progression table */
.progression-table{width:100%;border-collapse:collapse;font-size:0.8rem;margin-top:8px;}
.progression-table th{background:var(--card2);color:var(--gold);padding:6px;text-align:left;font-family:'Cinzel',serif;font-weight:600;border-bottom:1px solid var(--border);}
.progression-table td{padding:6px;border-bottom:1px solid var(--border2);color:var(--muted);}
.progression-table tr:hover td{background:var(--card2);color:var(--text);}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:var(--dim);}
.empty span{font-size:3rem;display:block;margin-bottom:12px;}
.empty p{font-size:1rem;color:var(--muted);}

/* PAGE */
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:24px;}
.page-btn{padding:7px 13px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.8rem;transition:all 0.2s;}
.page-btn:hover:not(:disabled):not(.active){border-color:var(--gold);color:var(--gold);}
.page-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
.page-btn:disabled{opacity:0.3;cursor:default;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .detail-panel{width:100%;top:49px;}
  .topbar-nav a { padding: 5px 7px; font-size: 0.62rem; }
}
</style>
</head>
<body>

<nav class="topbar">
  <a class="topbar-logo" href="index.html">⚔ D&D 5e</a>
  <div class="topbar-nav">
    <a href="ficha.html">Ficha</a>
    <a href="creador.html">Creador</a>
    <a href="tienda.html">Tienda</a>
    <a href="grimorio.html">Grimorio</a>
    <a href="bestiario.html">Bestiario</a>
    <a href="razas.html">Razas</a>
    <a href="clases.html" class="active">Clases</a>
    <a href="dotes.html">Dotes</a>
    <a href="rasgos.html">Rasgos</a>
    <a href="dm.html">DM</a>
  </div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Buscar</h3>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Nombre de la clase..." oninput="filterAndRender()">
    </div>

    <h3>Fuente</h3>
    <div class="filter-chips" id="sourceChips">
      <div class="chip on" data-source="all">Todas</div>
      <div class="chip" data-source="phb">Manual del Jugador</div>
      <div class="chip" data-source="xge">Xanathar</div>
      <div class="chip" data-source="tce">Tasha</div>
      <div class="chip" data-source="scag">SCAG</div>
      <div class="chip" data-source="homebrew">Homebrew</div>
    </div>

    <h3>Tipo</h3>
    <div class="filter-chips" id="typeChips">
      <div class="chip on" data-type="all">Todos</div>
      <div class="chip" data-type="martial">Marcial</div>
      <div class="chip" data-type="spellcaster">Lanzador</div>
      <div class="chip" data-type="halfcaster">Medio Lanzador</div>
    </div>

    <h3>Dado de Golpe</h3>
    <div class="filter-chips" id="hitDiceChips">
      <div class="chip on" data-hd="all">Todos</div>
      <div class="chip" data-hd="d12">d12</div>
      <div class="chip" data-hd="d10">d10</div>
      <div class="chip" data-hd="d8">d8</div>
      <div class="chip" data-hd="d6">d6</div>
    </div>

    <h3>Salvaciones</h3>
    <div class="prop-list" id="saveFilters">
      <label class="prop-check"><input type="checkbox" data-save="fuerza" onchange="filterAndRender()"> Fuerza</label>
      <label class="prop-check"><input type="checkbox" data-save="destreza" onchange="filterAndRender()"> Destreza</label>
      <label class="prop-check"><input type="checkbox" data-save="constitucion" onchange="filterAndRender()"> Constitución</label>
      <label class="prop-check"><input type="checkbox" data-save="inteligencia" onchange="filterAndRender()"> Inteligencia</label>
      <label class="prop-check"><input type="checkbox" data-save="sabiduria" onchange="filterAndRender()"> Sabiduría</label>
      <label class="prop-check"><input type="checkbox" data-save="carisma" onchange="filterAndRender()"> Carisma</label>
    </div>

    <h3>Habilidades Primarias</h3>
    <div class="prop-list" id="skillFilters">
      <label class="prop-check"><input type="checkbox" data-skill="fuerza" onchange="filterAndRender()"> Fuerza</label>
      <label class="prop-check"><input type="checkbox" data-skill="destreza" onchange="filterAndRender()"> Destreza</label>
      <label class="prop-check"><input type="checkbox" data-skill="constitucion" onchange="filterAndRender()"> Constitución</label>
      <label class="prop-check"><input type="checkbox" data-skill="inteligencia" onchange="filterAndRender()"> Inteligencia</label>
      <label class="prop-check"><input type="checkbox" data-skill="sabiduria" onchange="filterAndRender()"> Sabiduría</label>
      <label class="prop-check"><input type="checkbox" data-skill="carisma" onchange="filterAndRender()"> Carisma</label>
    </div>

    <button class="btn-reset" onclick="resetFilters()">✕ Limpiar Filtros</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="toolbar">
      <div class="results-count"><strong id="countNum">0</strong> clases encontradas</div>
      <select class="sort-select" id="sortSel" onchange="filterAndRender()">
        <option value="nombre">Nombre A→Z</option>
        <option value="nombre_desc">Nombre Z→A</option>
        <option value="source">Fuente</option>
        <option value="hd">Dado de Golpe</option>
      </select>
    </div>

    <div id="classesGrid" class="grid-view"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detailContent"></div>
</div>

<script>
/* =====================================================
   BIBLIOTECA DE CLASES D&D 5e
   ===================================================== */
const CLASSES = [
  // ════════════════════════════════════════════
  // CLASES DEL MANUAL DEL JUGADOR
  // ════════════════════════════════════════════
  {
    id: 'barbarian',
    nombre: 'Bárbaro',
    plural: 'Bárbaros',
    icono: '🪓',
    source: 'phb',
    type: 'martial',
    descripcion: 'Los bárbaros son guerreros feroz de tierras salvajes, definidos por su furia en combate. Canalizan su ira primordial para obtener poderes sobrehumanos, resistencia increíble y capacidad de destrucción masiva.',
    hitDie: 'd12',
    primaryAbility: ['Fuerza', 'Constitución'],
    savingThrows: ['Fuerza', 'Constitución'],
    armorProficiencies: ['Armadura ligera', 'Armadura media', 'Escudos'],
    weaponProficiencies: ['Armas simples', 'Armas marciales'],
    toolProficiencies: [],
    skillChoices: 2,
    skillList: ['Manejo de animales', 'Atletismo', 'Intimidación', 'Naturaleza', 'Percepción', 'Supervivencia'],
    equipment: [
      'Un hacha de dos manos O cualquier arma marcial cuerpo a cuerpo',
      'Dos hachas de mano O cualquier arma simple',
      'Un paquete de explorador Y cuatro jabalinas'
    ],
    features: [
      {
        name: 'Furia',
        level: 1,
        desc: 'En combate, luchas con una ferocidad primitiva. Como acción bonus, entras en furia durante 1 minuto. Obtienes ventaja en tiradas de Fuerza, daño extra +2 (aumenta con nivel), y resistencia a daño contundente, perforante y cortante. No puedes usar armadura pesada ni lanzar hechizos.'
      },
      {
        name: 'Defensa sin Armadura',
        level: 1,
        desc: 'Mientras no llevas armadura ni escudo, tu CA es 10 + tu modificador de Destreza + tu modificador de Constitución.'
      },
      {
        name: 'Ataque Imprudente',
        level: 2,
        desc: 'Puedes obtener ventaja en tiradas de ataque cuerpo a cuerpo usando Fuerza durante tu turno, pero las tiradas de ataque contra ti tienen ventaja hasta tu siguiente turno.'
      },
      {
        name: 'Sentido del Peligro',
        level: 2,
        desc: 'Tienes ventaja en tiradas de salvación de Destreza contra efectos que puedas ver, como trampas y hechizos. No funciona si estás cegado, ensordecido o incapacitado.'
      },
      {
        name: 'Ataque Extra',
        level: 5,
        desc: 'Puedes atacar dos veces, en lugar de una, cuando realizas la acción de Ataque en tu turno.'
      },
      {
        name: 'Movimiento Rápido',
        level: 5,
        desc: 'Tu velocidad aumenta en 10 pies cuando no llevas armadura pesada.'
      },
      {
        name: 'Instinto Salvaje',
        level: 7,
        desc: 'Tienes ventaja en tiradas de iniciativa.'
      },
      {
        name: 'Furia Implacable',
        level: 11,
        desc: 'Tu furia es tan intensa que solo termina si caes inconsciente o eliges terminarla. Además, tu bonificación de daño aumenta.'
      },
      {
        name: 'Furia Persistente',
        level: 15,
        desc: 'Tu furia no termina prematuramente incluso si quedas inconsciente.'
      },
      {
        name: 'Furia Indómita',
        level: 18,
        desc: 'Mientras estás en furia, obtienes resistencia a todo daño excepto psíquico.'
      },
      {
        name: 'Campeón Primal',
        level: 20,
        desc: 'Tu Fuerza y Constitución aumentan en 4 (máximo 24). Obtienes regeneración de PG mientras estás en furia.'
      }
    ],
    subclasses: [
      {
        name: 'Camino del Berserker',
        source: 'phb',
        desc: 'Los berserkers canalizan su furia en una violencia desenfrenada.',
        features: [
          'Frenesí (3): Puedes hacer un ataque cuerpo a cuerpo como acción bonus, pero ganas nivel de agotamiento tras la furia',
          'Intimidación Intimidante (6): Puedes intentar asustar como acción',
          'Mente Inquebrantable (10): Inmune a encantado/asustado en furia',
          'Presencia Intimidante (14): Criaturas a 30 pies deben salvar o quedar asustadas'
        ]
      },
      {
        name: 'Camino del Guerrero Totémico',
        source: 'phb',
        desc: 'Los guerreros totémicos adoptan el espíritu de bestias como el oso, el águila, el lobo o el tigre.',
        features: [
          'Guía del Totem (3): Adoptas un animal espiritual que otorga beneficios',
          'Aspecto de la Bestia (6): Obtienes características de tu totem (visión, escalada, etc.)',
          'Furia del Totem (14): Tu totem otorga poderes adicionales en furia'
        ]
      }
    ],

/* =====================================================
   LÓGICA DE FILTRADO Y RENDERIZADO
   ===================================================== */
let currentPage = 1;
const PER_PAGE = 20;
let filtered = [...CLASSES];
let selectedId = null;

// CHIPS
document.querySelectorAll('#sourceChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#sourceChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});
document.querySelectorAll('#typeChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#typeChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});
document.querySelectorAll('#hitDiceChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#hitDiceChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});

function filterAndRender() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const source = document.querySelector('#sourceChips .chip.on')?.dataset.source || 'all';
  const type = document.querySelector('#typeChips .chip.on')?.dataset.type || 'all';
  const hitDie = document.querySelector('#hitDiceChips .chip.on')?.dataset.hd || 'all';
  
  const activeSaves = [...document.querySelectorAll('[data-save]:checked')].map(cb => cb.dataset.save);
  const activeSkills = [...document.querySelectorAll('[data-skill]:checked')].map(cb => cb.dataset.skill);
  
  const sort = document.getElementById('sortSel').value;

  filtered = CLASSES.filter(cls => {
    if (q && !cls.nombre.toLowerCase().includes(q) && !cls.descripcion.toLowerCase().includes(q)) return false;
    if (source !== 'all' && cls.source !== source) return false;
    if (type !== 'all' && cls.type !== type) return false;
    if (hitDie !== 'all' && cls.hitDie !== hitDie) return false;
    
    if (activeSaves.length > 0) {
      const saveMatch = activeSaves.every(save => 
        cls.savingThrows.some(st => st.toLowerCase().includes(save))
      );
      if (!saveMatch) return false;
    }
    
    if (activeSkills.length > 0) {
      const skillMatch = activeSkills.every(skill => 
        cls.primaryAbility.some(pa => pa.toLowerCase().includes(skill))
      );
      if (!skillMatch) return false;
    }
    
    return true;
  });

  // SORT
  filtered.sort((a, b) => {
    if (sort === 'nombre') return a.nombre.localeCompare(b.nombre,'es');
    if (sort === 'nombre_desc') return b.nombre.localeCompare(a.nombre,'es');
    if (sort === 'source') return a.source.localeCompare(b.source) || a.nombre.localeCompare(b.nombre,'es');
    if (sort === 'hd') {
      const hdOrder = {'d12': 12, 'd10': 10, 'd8': 8, 'd6': 6};
      return (hdOrder[b.hitDie] || 0) - (hdOrder[a.hitDie] || 0);
    }
    return 0;
  });

  currentPage = 1;
  render();
}

function render() {
  const grid = document.getElementById('classesGrid');
  const start = (currentPage-1)*PER_PAGE;
  const page = filtered.slice(start, start+PER_PAGE);

  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><span>🔍</span><h3>Sin resultados</h3><p>Prueba con otros filtros o búsqueda</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const typeColor = getTypeColor(page[0]?.type || 'martial');
  
  grid.innerHTML = page.map(cls => {
    const abilitiesText = cls.primaryAbility.join(', ');
    const featuresPreview = cls.features.slice(0, 3).map(f => f.name).join(' • ');
    
    return `<div class="class-card${cls.id===selectedId?' selected':''}" style="--type-color:${typeColor}" onclick="showDetail('${cls.id}')">
      <div class="class-header">
        <span class="class-icon">${cls.icono}</span>
        <div class="class-title">
          <div class="class-name">${cls.nombre}</div>
          <div class="class-source">${getSourceLabel(cls.source)}</div>
        </div>
      </div>
      <div class="class-stats">
        <span class="class-stat">${cls.hitDie}</span>
        <span class="class-stat">${cls.savingThrows.join('/')}</span>
        ${cls.spellcasting ? '<span class="class-stat">✨</span>' : ''}
      </div>
      <div class="class-desc">${cls.descripcion}</div>
      <div class="class-features">
        ${featuresPreview.split(' • ').map(f => `<span class="class-feature">${f}</span>`).join('')}
      </div>
    </div>`;
  }).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="gotoPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=1)
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===2)
      html += `<span style="color:var(--dim);padding:0 4px">…</span>`;
  }
  html += `<button class="page-btn" onclick="gotoPage(${currentPage+1})" ${currentPage===total?'disabled':''}>→</button>`;
  pg.innerHTML = html;
}

function gotoPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p<1||p>total) return;
  currentPage = p;
  render();
  document.querySelector('.main').scrollTop = 0;
}

    <div class="detail-section">
      <h4>Competencias</h4>
      <div class="ability-grid">
        <div class="ability-item">
          <span class="ability-name">Armadura</span>
          <span class="ability-bonus">${cls.armorProficiencies.join(', ') || 'Ninguna'}</span>
        </div>
        <div class="ability-item">
          <span class="ability-name">Armas</span>
          <span class="ability-bonus">${cls.weaponProficiencies.join(', ') || 'Ninguna'}</span>
        </div>
        <div class="ability-item">
          <span class="ability-name">Herramientas</span>
          <span class="ability-bonus">${cls.toolProficiencies.join(', ') || 'Ninguna'}</span>
        </div>
        <div class="ability-item">
          <span class="ability-name">Habilidades</span>
          <span class="ability-bonus">Elige ${cls.skillChoices}</span>
        </div>
      </div>
    </div>

    <div class="detail-section">
      <h4>Descripción</h4>
      <div class="detail-desc">${cls.descripcion}</div>
    </div>

    ${equipmentHtml}

    ${spellcastingHtml}

    <div class="detail-section">
      <h4>Rasgos de Clase</h4>
      ${cls.features.map(f => `
        <div class="feature-item">
          <div class="feature-name">${f.name} <span class="feature-level">Nv. ${f.level}</span></div>
          <div class="feature-desc">${f.desc}</div>
        </div>
      `).join('')}
    </div>

    ${subclassesHtml}

    <div class="detail-section">
      <h4>Multiclase</h4>
      <div class="detail-desc">
        <strong>Requisitos:</strong> ${cls.multiclassRequirements}<br>
        <strong>Competencias ganadas:</strong> ${Array.isArray(cls.multiclassProficiencies) ? cls.multiclassProficiencies.join(', ') : cls.multiclassProficiencies}
      </div>
    </div>

    <div class="detail-tags">
      <span class="detail-tag ${tagClass}">${getTypeLabel(cls.type)}</span>
      <span class="detail-tag tag-default">${cls.hitDie}</span>
      <span class="detail-tag tag-default">${cls.savingThrows.join('/')}</span>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
  render();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('#sourceChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('#typeChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('#hitDiceChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('[data-save]').forEach(cb=>cb.checked=false);
  document.querySelectorAll('[data-skill]').forEach(cb=>cb.checked=false);
  document.getElementById('sortSel').value = 'nombre';
  filterAndRender();
}

function getTypeColor(type) {
  const m = {martial:'#c62828',spellcaster:'#42a5f5',halfcaster:'#ab47bc'};
  return m[type]||'#888';
}

function getTagClass(type) {
  const m = {martial:'tag-martial',spellcaster:'tag-spellcaster',halfcaster:'tag-halfcaster'};
  return m[type]||'tag-default';
}

function getSourceLabel(src) {
  const m = {phb:'DMG',xge:'Xanathar',tce:'Tasha',scag:'SCAG',homebrew:'Homebrew'};
  return m[src]||src.toUpperCase();
}

function getTypeLabel(type) {
  const m = {martial:'Marcial',spellcaster:'Lanzador',halfcaster:'Medio Lanzador'};
  return m[type]||type;
}

// INIT
filterAndRender();
</script>
</body>
</html>
