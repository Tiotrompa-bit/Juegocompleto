<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grimorio — D&D 5e</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap');
:root{
  --bg:#0d0d0d; --surface:#141414; --card:#1a1a1a; --card2:#1f1f1f;
  --border:#2a2a2a; --border2:#333;
  --red:#c62828; --red2:#e53935; --gold:#c8a84b; --gold2:#e8c87a;
  --text:#e8e0d0; --muted:#888; --dim:#555;
  --green:#4caf50; --blue:#42a5f5; --purple:#ab47bc; --orange:#ff7043;
  --cyan:#26c6da; --indigo:#5c6bc0;
  --radius:6px;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Crimson Text',Georgia,serif;min-height:100vh;}

/* NAV */
.topbar{display:flex;align-items:center;gap:16px;padding:12px 20px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;}
.topbar-logo{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold);text-decoration:none;white-space:nowrap;}
.topbar-nav{display:flex;gap:4px;margin-left:auto;}
.topbar-nav a{color:var(--muted);text-decoration:none;padding:6px 12px;border-radius:var(--radius);font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:0.5px;transition:all 0.2s;}
.topbar-nav a:hover{color:var(--gold);background:rgba(200,168,75,0.08);}
.topbar-nav a.active{color:var(--gold);background:rgba(200,168,75,0.12);}

/* LAYOUT */
.layout{display:grid;grid-template-columns:260px 1fr;min-height:calc(100vh - 49px);}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:20px;position:sticky;top:49px;height:calc(100vh - 49px);overflow-y:auto;}
.main{padding:24px;overflow-y:auto;}

/* SIDEBAR */
.sidebar h3{font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:12px;margin-top:20px;}
.sidebar h3:first-child{margin-top:0;}
.search-wrap{position:relative;margin-bottom:4px;}
.search-wrap input{width:100%;padding:9px 12px 9px 34px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.95rem;}
.search-wrap::before{content:'🔮';position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);font-size:0.85rem;}
.search-wrap input:focus{outline:none;border-color:var(--gold);background:var(--card2);}

.filter-chips{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:4px;}
.chip{padding:4px 10px;border-radius:20px;border:1px solid var(--border2);background:var(--card);color:var(--muted);font-size:0.78rem;cursor:pointer;transition:all 0.2s;font-family:'Cinzel',serif;letter-spacing:0.3px;}
.chip:hover{border-color:var(--gold);color:var(--gold);}
.chip.on{background:var(--gold);border-color:var(--gold);color:#000;font-weight:600;}

.range-row{display:flex;gap:8px;align-items:center;}
.range-row input{flex:1;padding:7px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;width:100%;}
.range-row input:focus{outline:none;border-color:var(--gold);}
.range-row span{color:var(--muted);font-size:0.85rem;}

.prop-list{display:flex;flex-direction:column;gap:4px;}
.prop-check{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:0.88rem;color:var(--muted);padding:3px 0;}
.prop-check input{accent-color:var(--gold);width:14px;height:14px;}
.prop-check:hover{color:var(--text);}

.btn-reset{width:100%;padding:8px;margin-top:16px;background:transparent;border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.75rem;letter-spacing:1px;transition:all 0.2s;}
.btn-reset:hover{border-color:var(--red);color:var(--red);}

/* MAIN AREA */
.toolbar{display:flex;align-items:center;gap:12px;margin-bottom:20px;flex-wrap:wrap;}
.results-count{color:var(--muted);font-size:0.88rem;margin-right:auto;}
.results-count strong{color:var(--gold);}
.sort-select{padding:8px 12px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--text);font-family:inherit;font-size:0.88rem;cursor:pointer;}
.sort-select:focus{outline:none;border-color:var(--gold);}
.view-btns{display:flex;gap:4px;}
.view-btn{padding:8px 10px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-size:1rem;transition:all 0.2s;}
.view-btn.on{background:var(--gold);border-color:var(--gold);color:#000;}

/* GRID VIEW */
#spellsGrid.grid-view{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px;}
#spellsGrid.list-view{display:flex;flex-direction:column;gap:6px;}

/* SPELL CARD - GRID */
.spell-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all 0.2s;position:relative;overflow:hidden;}
.spell-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--school-color,var(--dim));opacity:0.7;transition:opacity 0.2s;}
.spell-card:hover{border-color:var(--border2);background:var(--card2);transform:translateY(-1px);}
.spell-card:hover::before{opacity:1;}
.spell-card.selected{border-color:var(--gold);background:var(--card2);}
.spell-card.selected::before{opacity:1;}

/* Grid card layout */
.grid-view .spell-card{padding:14px;}
.grid-view .spell-level{position:absolute;top:12px;right:12px;font-family:'Cinzel',serif;font-size:0.7rem;color:var(--gold);border:1px solid var(--border2);padding:2px 8px;border-radius:12px;}
.grid-view .spell-icon{font-size:1.8rem;margin-bottom:8px;display:block;}
.grid-view .spell-name{font-family:'Cinzel',serif;font-size:0.9rem;color:var(--text);margin-bottom:4px;line-height:1.3;padding-right:40px;}
.grid-view .spell-school{font-size:0.8rem;color:var(--muted);margin-bottom:8px;font-style:italic;text-transform:capitalize;}
.grid-view .spell-cast{font-size:0.82rem;color:var(--gold2);margin-bottom:2px;}
.grid-view .spell-range{font-size:0.82rem;color:var(--muted);margin-bottom:8px;}
.grid-view .spell-components{display:flex;gap:4px;margin-top:8px;}
.comp-badge{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem;font-weight:bold;border:1px solid;}
.comp-v{background:rgba(66,165,245,0.15);color:var(--blue);border-color:var(--blue);}
.comp-s{background:rgba(171,71,188,0.15);color:var(--purple);border-color:var(--purple);}
.comp-m{background:rgba(76,175,80,0.15);color:var(--green);border-color:var(--green);}

/* List card layout */
.list-view .spell-card{padding:10px 14px;display:grid;grid-template-columns:2rem 1fr auto auto auto;align-items:center;gap:12px;}
.list-view .spell-icon{font-size:1.3rem;}
.list-view .spell-name{font-family:'Cinzel',serif;font-size:0.85rem;}
.list-view .spell-school{font-size:0.78rem;color:var(--muted);font-style:italic;}
.list-view .spell-cast{font-size:0.82rem;color:var(--gold2);}
.list-view .spell-level{font-family:'Cinzel',serif;font-size:0.75rem;color:var(--gold);border:1px solid var(--border2);padding:2px 8px;border-radius:12px;}
.list-view .spell-components{display:none;}

/* DETAIL PANEL */
.detail-panel{position:fixed;right:0;top:49px;bottom:0;width:400px;background:var(--surface);border-left:1px solid var(--border);padding:24px;overflow-y:auto;transform:translateX(100%);transition:transform 0.3s ease;z-index:90;}
.detail-panel.open{transform:translateX(0);}
.detail-close{position:absolute;top:16px;right:16px;background:transparent;border:none;color:var(--muted);cursor:pointer;font-size:1.3rem;padding:4px 8px;}
.detail-close:hover{color:var(--text);}
.detail-icon{font-size:3rem;display:block;margin-bottom:12px;}
.detail-name{font-family:'Cinzel',serif;font-size:1.3rem;color:var(--gold);margin-bottom:4px;line-height:1.3;}
.detail-school{font-size:0.82rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:16px;font-family:'Cinzel',serif;}
.detail-level{font-family:'Cinzel',serif;font-size:1.1rem;color:var(--gold2);font-weight:700;margin-bottom:16px;}
.detail-section{margin-bottom:16px;}
.detail-section h4{font-family:'Cinzel',serif;font-size:0.7rem;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;border-bottom:1px solid var(--border);padding-bottom:4px;}
.detail-desc{font-size:0.92rem;line-height:1.7;color:var(--text);margin-bottom:12px;}
.detail-higher{font-size:0.88rem;color:var(--gold2);font-style:italic;border-left:2px solid var(--gold);padding-left:10px;margin-top:8px;}
.stat-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:0.88rem;}
.stat-row:last-child{border-bottom:none;}
.stat-label{color:var(--muted);}
.stat-val{color:var(--text);font-weight:600;}
.stat-val.conjuration{color:var(--purple);}
.stat-val.evocation{color:var(--red2);}
.stat-val.abjuration{color:var(--blue);}
.stat-val.divination{color:var(--cyan);}
.stat-val.enchantment{color:var(--orange);}
.stat-val.illusion{color:var(--indigo);}
.stat-val.necromancy{color:var(--green);}
.stat-val.transmutation{color:#ffca28;}

.detail-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px;}
.detail-tag{padding:3px 10px;border-radius:12px;font-size:0.75rem;border:1px solid;font-family:'Cinzel',serif;}
.tag-ritual{color:var(--blue);border-color:var(--blue);background:rgba(66,165,245,0.08);}
.tag-concentration{color:var(--orange);border-color:var(--orange);background:rgba(255,112,67,0.08);}
.tag-attack{color:var(--red);border-color:var(--red);background:rgba(198,40,40,0.08);}
.tag-save{color:var(--purple);border-color:var(--purple);background:rgba(171,71,188,0.08);}
.tag-healing{color:var(--green);border-color:var(--green);background:rgba(76,175,80,0.08);}
.tag-damage{color:var(--red2);border-color:var(--red2);background:rgba(229,57,53,0.08);}
.tag-buff{color:#ffca28;border-color:#ffca28;background:rgba(255,202,40,0.08);}
.tag-control{color:var(--indigo);border-color:var(--indigo);background:rgba(92,107,192,0.08);}

.class-list{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px;}
.class-tag{padding:2px 8px;border-radius:4px;font-size:0.75rem;background:var(--card);border:1px solid var(--border2);color:var(--muted);}

/* EMPTY STATE */
.empty{text-align:center;padding:80px 20px;color:var(--dim);}
.empty span{font-size:3rem;display:block;margin-bottom:12px;}
.empty p{font-size:1rem;color:var(--muted);}

/* PAGE */
.pagination{display:flex;justify-content:center;align-items:center;gap:6px;margin-top:24px;}
.page-btn{padding:7px 13px;background:var(--card);border:1px solid var(--border2);border-radius:var(--radius);color:var(--muted);cursor:pointer;font-family:'Cinzel',serif;font-size:0.8rem;transition:all 0.2s;}
.page-btn:hover:not(:disabled):not(.active){border-color:var(--gold);color:var(--gold);}
.page-btn.active{background:var(--gold);border-color:var(--gold);color:#000;font-weight:700;}
.page-btn:disabled{opacity:0.3;cursor:default;}

/* Scrollbar */
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}

@media(max-width:768px){
  .layout{grid-template-columns:1fr;}
  .sidebar{position:static;height:auto;border-right:none;border-bottom:1px solid var(--border);}
  .detail-panel{width:100%;top:0;}
}
</style>
</head>

    <a href="rasgos.html">Rasgos</a>

  </div>
</nav>

<div class="layout">
  <!-- SIDEBAR -->
  <aside class="sidebar">
    <h3>Buscar</h3>
    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Nombre del hechizo..." oninput="filterAndRender()">
    </div>

    <h3>Nivel</h3>
    <div class="filter-chips" id="levelChips">
      <div class="chip on" data-level="all">Todos</div>
      <div class="chip" data-level="0">Truco</div>
      <div class="chip" data-level="1">1º</div>
      <div class="chip" data-level="2">2º</div>
      <div class="chip" data-level="3">3º</div>
      <div class="chip" data-level="4">4º</div>
      <div class="chip" data-level="5">5º</div>
      <div class="chip" data-level="6">6º</div>
      <div class="chip" data-level="7">7º</div>
      <div class="chip" data-level="8">8º</div>
      <div class="chip" data-level="9">9º</div>
    </div>

    <h3>Escuela</h3>
    <div class="filter-chips" id="schoolChips">
      <div class="chip on" data-school="all">Todas</div>
      <div class="chip" data-school="abjuration">Abjuración</div>
      <div class="chip" data-school="conjuration">Conjuración</div>
      <div class="chip" data-school="divination">Adivinación</div>
      <div class="chip" data-school="enchantment">Encantamiento</div>
      <div class="chip" data-school="evocation">Evocación</div>
      <div class="chip" data-school="illusion">Ilusión</div>
      <div class="chip" data-school="necromancy">Nigromancia</div>
      <div class="chip" data-school="transmutation">Transmutación</div>
    </div>

    <h3>Clase</h3>
    <div class="prop-list" id="classFilters">
      <label class="prop-check"><input type="checkbox" data-class="mago" onchange="filterAndRender()"> Mago</label>
      <label class="prop-check"><input type="checkbox" data-class="clérigo" onchange="filterAndRender()"> Clérigo</label>
      <label class="prop-check"><input type="checkbox" data-class="druida" onchange="filterAndRender()"> Druida</label>
      <label class="prop-check"><input type="checkbox" data-class="brujo" onchange="filterAndRender()"> Brujo</label>
      <label class="prop-check"><input type="checkbox" data-class="hechicero" onchange="filterAndRender()"> Hechicero</label>
      <label class="prop-check"><input type="checkbox" data-class="bardo" onchange="filterAndRender()"> Bardo</label>
      <label class="prop-check"><input type="checkbox" data-class="paladín" onchange="filterAndRender()"> Paladín</label>
      <label class="prop-check"><input type="checkbox" data-class="explorador" onchange="filterAndRender()"> Explorador</label>
    </div>

    <h3>Propiedades</h3>
    <div class="prop-list" id="propFilters">
      <label class="prop-check"><input type="checkbox" data-prop="ritual" onchange="filterAndRender()"> Ritual</label>
      <label class="prop-check"><input type="checkbox" data-prop="concentration" onchange="filterAndRender()"> Concentración</label>
      <label class="prop-check"><input type="checkbox" data-prop="attack" onchange="filterAndRender()"> Ataque</label>
      <label class="prop-check"><input type="checkbox" data-prop="save" onchange="filterAndRender()"> Salvación</label>
      <label class="prop-check"><input type="checkbox" data-prop="healing" onchange="filterAndRender()"> Curación</label>
      <label class="prop-check"><input type="checkbox" data-prop="damage" onchange="filterAndRender()"> Daño</label>
    </div>

    <button class="btn-reset" onclick="resetFilters()">✕ Limpiar Filtros</button>
  </aside>

  <!-- MAIN -->
  <main class="main">
    <div class="toolbar">
      <div class="results-count"><strong id="countNum">0</strong> hechizos encontrados</div>
      <select class="sort-select" id="sortSel" onchange="filterAndRender()">
        <option value="nombre">Nombre A→Z</option>
        <option value="nombre_desc">Nombre Z→A</option>
        <option value="nivel_asc">Nivel: Menor primero</option>
        <option value="nivel_desc">Nivel: Mayor primero</option>
        <option value="escuela">Escuela</option>
      </select>
      <div class="view-btns">
        <button class="view-btn on" id="vGrid" onclick="setView('grid')" title="Cuadrícula">▦</button>
        <button class="view-btn" id="vList" onclick="setView('list')" title="Lista">≡</button>
      </div>
    </div>

    <div id="spellsGrid" class="grid-view"></div>
    <div class="pagination" id="pagination"></div>
  </main>
</div>

<!-- DETAIL PANEL -->
<div class="detail-panel" id="detailPanel">
  <button class="detail-close" onclick="closeDetail()">✕</button>
  <div id="detailContent"></div>
</div>

<script>
/* =====================================================
   BIBLIOTECA DE HECHIZOS D&D 5e
   ===================================================== */
const SPELLS = [
  // ════════════════════════════════════════════
  // TRUCOS (NIVEL 0)
  // ════════════════════════════════════════════
  {id:'acid_splash',nombre:'Salpicadura de Ácido',level:0,school:'conjuration',icono:'🧪',

   tags:['damage','save']},

  {id:'wish',nombre:'Deseo',level:9,school:'conjuration',icono:'✨',

   desc:'Alteras realidad. Duplicas hechizo de nivel 8 o menor sin componentes. O efecto mayor con riesgo de consecuencias (33% probabilidad de no poder lanzar más).',
   tags:['control']},

/* =====================================================
   LÓGICA DE FILTRADO Y RENDERIZADO
   ===================================================== */
let currentView = 'grid';
let currentPage = 1;
const PER_PAGE = 24;
let filtered = [...SPELLS];
let selectedId = null;

// CHIPS
document.querySelectorAll('#levelChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#levelChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});
document.querySelectorAll('#schoolChips .chip').forEach(c => {
  c.onclick = () => {
    document.querySelectorAll('#schoolChips .chip').forEach(x => x.classList.remove('on'));
    c.classList.add('on');
    filterAndRender();
  };
});

function filterAndRender() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  const level = document.querySelector('#levelChips .chip.on')?.dataset.level || 'all';
  const school = document.querySelector('#schoolChips .chip.on')?.dataset.school || 'all';
  const activeClasses = [...document.querySelectorAll('[data-class]:checked')].map(cb => cb.dataset.class);
  const activeProps = [...document.querySelectorAll('[data-prop]:checked')].map(cb => cb.dataset.prop);
  const sort = document.getElementById('sortSel').value;

  filtered = SPELLS.filter(spell => {
    if (q && !spell.nombre.toLowerCase().includes(q) && !spell.desc.toLowerCase().includes(q)) return false;
    if (level !== 'all' && spell.level !== parseInt(level)) return false;
    if (school !== 'all' && spell.school !== school) return false;
    if (activeClasses.length > 0 && !activeClasses.some(c => spell.classes.includes(c))) return false;
    if (activeProps.length > 0 && !activeProps.every(p => spell.tags.includes(p))) return false;
    return true;
  });

  // SORT
  filtered.sort((a, b) => {
    if (sort === 'nombre') return a.nombre.localeCompare(b.nombre,'es');
    if (sort === 'nombre_desc') return b.nombre.localeCompare(a.nombre,'es');
    if (sort === 'nivel_asc') return a.level - b.level;
    if (sort === 'nivel_desc') return b.level - a.level;
    if (sort === 'escuela') return a.school.localeCompare(b.school,'es');
    return 0;
  });

  currentPage = 1;
  render();
}

function render() {
  const grid = document.getElementById('spellsGrid');
  const start = (currentPage-1)*PER_PAGE;
  const page = filtered.slice(start, start+PER_PAGE);

  document.getElementById('countNum').textContent = filtered.length;

  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty"><span>🔍</span><h3>Sin resultados</h3><p>Prueba con otros filtros o búsqueda</p></div>';
    document.getElementById('pagination').innerHTML = '';
    return;
  }

  const isGrid = currentView === 'grid';
  grid.innerHTML = page.map(spell => {
    const schoolColor = getSchoolColor(spell.school);
    const levelLabel = spell.level === 0 ? 'Truco' : spell.level + 'º';
    
    if (isGrid) {
      return `<div class="spell-card${spell.id===selectedId?' selected':''}" style="--school-color:${schoolColor}" onclick="showDetail('${spell.id}')">
        <span class="spell-level">${levelLabel}</span>
        <span class="spell-icon">${spell.icono}</span>
        <div class="spell-name">${spell.nombre}</div>
        <div class="spell-school">${getSchoolLabel(spell.school)}</div>
        <div class="spell-cast">⏱ ${spell.cast_time}</div>
        <div class="spell-range">📍 ${spell.range}</div>
        <div class="spell-components">
          ${spell.components.includes('V') ? '<span class="comp-badge comp-v">V</span>' : ''}
          ${spell.components.includes('S') ? '<span class="comp-badge comp-s">S</span>' : ''}
          ${spell.components.includes('M') ? '<span class="comp-badge comp-m">M</span>' : ''}
        </div>
      </div>`;
    } else {
      return `<div class="spell-card${spell.id===selectedId?' selected':''}" style="--school-color:${schoolColor}" onclick="showDetail('${spell.id}')">
        <span class="spell-icon">${spell.icono}</span>
        <div>
          <div class="spell-name">${spell.nombre}</div>
          <div class="spell-school">${getSchoolLabel(spell.school)} · ${spell.cast_time}</div>
        </div>
        <div class="spell-cast">${spell.range}</div>
        <span class="spell-level">${levelLabel}</span>
      </div>`;
    }
  }).join('');

  renderPagination();
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PER_PAGE);
  const pg = document.getElementById('pagination');
  if (total <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="gotoPage(${currentPage-1})" ${currentPage===1?'disabled':''}>←</button>`;
  for (let i=1; i<=total; i++) {
    if (i===1||i===total||Math.abs(i-currentPage)<=1)
      html += `<button class="page-btn${i===currentPage?' active':''}" onclick="gotoPage(${i})">${i}</button>`;
    else if (Math.abs(i-currentPage)===2)
      html += `<span style="color:var(--dim);padding:0 4px">…</span>`;
  }
  html += `<button class="page-btn" onclick="gotoPage(${currentPage+1})" ${currentPage===total?'disabled':''}>→</button>`;
  pg.innerHTML = html;
}

function gotoPage(p) {
  const total = Math.ceil(filtered.length / PER_PAGE);
  if (p<1||p>total) return;
  currentPage = p;
  render();
  document.querySelector('.main').scrollTop = 0;
}

function setView(v) {
  currentView = v;
  document.getElementById('spellsGrid').className = v==='grid' ? 'grid-view' : 'list-view';
  document.getElementById('vGrid').classList.toggle('on', v==='grid');
  document.getElementById('vList').classList.toggle('on', v==='list');
  render();
}

function showDetail(id) {
  const spell = SPELLS.find(s=>s.id===id);
  if (!spell) return;
  selectedId = id;
  render();

  const tagClass = tag => {
    const m = {
      'ritual':'tag-ritual', 'concentration':'tag-concentration', 'attack':'tag-attack',
      'save':'tag-save', 'healing':'tag-healing', 'damage':'tag-damage',
      'buff':'tag-buff', 'control':'tag-control'
    };
    return m[tag] || 'tag-default';
  };

  const levelLabel = spell.level === 0 ? 'Truco' : `${spell.level}º nivel`;
  const ritualBadge = spell.ritual ? '<span class="detail-tag tag-ritual">Ritual</span>' : '';
  const concBadge = spell.duration.includes('Concentración') ? '<span class="detail-tag tag-concentration">Concentración</span>' : '';

  const statsRows = [
    ['Tiempo de Lanzamiento', spell.cast_time],
    ['Alcance', spell.range],
    ['Duración', spell.duration],
    ['Componentes', spell.components.join(', ')]
  ];

  document.getElementById('detailContent').innerHTML = `
    <span class="detail-icon">${spell.icono}</span>
    <div class="detail-name">${spell.nombre}</div>
    <div class="detail-school">${getSchoolLabel(spell.school)}</div>
    <div class="detail-level">${levelLabel}</div>

    <div class="detail-tags">
      ${ritualBadge}
      ${concBadge}
      ${spell.tags.map(t=>`<span class="detail-tag ${tagClass(t)}">${getTagLabel(t)}</span>`).join('')}
    </div>

    <div class="detail-section">
      <h4>Descripción</h4>
      <p class="detail-desc">${spell.desc}</p>
      ${spell.higher ? `<p class="detail-higher"><strong>A niveles superiores:</strong> ${spell.higher}</p>` : ''}
    </div>

    <div class="detail-section">
      <h4>Detalles</h4>
      ${statsRows.map(([l,v])=>`<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-val ${spell.school}">${v}</span></div>`).join('')}
    </div>

    <div class="detail-section">
      <h4>Clases</h4>
      <div class="class-list">
        ${spell.classes.map(c=>`<span class="class-tag">${c.charAt(0).toUpperCase()+c.slice(1)}</span>`).join('')}
      </div>
    </div>
  `;

  document.getElementById('detailPanel').classList.add('open');
}

function closeDetail() {
  document.getElementById('detailPanel').classList.remove('open');
  selectedId = null;
  render();
}

function resetFilters() {
  document.getElementById('searchInput').value = '';
  document.querySelectorAll('#levelChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('#schoolChips .chip').forEach((c,i)=>c.classList.toggle('on',i===0));
  document.querySelectorAll('[data-class]').forEach(cb=>cb.checked=false);
  document.querySelectorAll('[data-prop]').forEach(cb=>cb.checked=false);
  document.getElementById('sortSel').value = 'nombre';
  filterAndRender();
}

function getSchoolColor(school) {
  const m = {
    abjuration:'#42a5f5', conjuration:'#ab47bc', divination:'#26c6da',
    enchantment:'#ff7043', evocation:'#e53935', illusion:'#5c6bc0',
    necromancy:'#4caf50', transmutation:'#ffca28'
  };
  return m[school]||'#888';
}

function getSchoolLabel(school) {
  const m = {
    abjuration:'Abjuración', conjuration:'Conjuración', divination:'Adivinación',
    enchantment:'Encantamiento', evocation:'Evocación', illusion:'Ilusión',
    necromancy:'Nigromancia', transmutation:'Transmutación'
  };
  return m[school]||school;
}

function getTagLabel(tag) {
  const m = {
    ritual:'Ritual', concentration:'Concentración', attack:'Ataque',
    save:'Salvación', healing:'Curación', damage:'Daño', buff:'Mejora', control:'Control'
  };
  return m[tag]||tag;
}

// INIT
filterAndRender();
</script>
